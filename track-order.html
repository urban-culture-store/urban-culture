<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Track Order</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.back{
background:white;
color:black;
padding:10px 15px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.card{
background:#111;
border:1px solid #222;
border-radius:20px;
padding:20px;
margin-bottom:20px;
}

.order-id{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.status{
color:#00ff88;
font-size:20px;
font-weight:bold;
}

.timeline{
margin-top:25px;
}

.step{
display:flex;
align-items:center;
margin-bottom:25px;
}

.circle{
width:25px;
height:25px;
border-radius:50%;
background:#333;
margin-right:15px;
}

.active{
background:#00ff88;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h2>Track Order</h2>

<a
href="my-orders.html"
class="back">
Back
</a>

</div>

<div class="card">

<div
class="order-id"
id="orderId">
Loading...
</div>

<div
class="status"
id="statusText">
Loading...
</div>

<div class="timeline">

<div class="step">
<div class="circle"
id="s1"></div>
<div>Order Placed</div>
</div>

<div class="step">
<div class="circle"
id="s2"></div>
<div>Packed</div>
</div>
<div class="step">
<div class="circle"
id="s3"></div>
<div>Shipped</div>
</div>

<div class="step">
<div class="circle"
id="s4"></div>
<div>Out For Delivery</div>
</div>

<div class="step">
<div class="circle"
id="s5"></div>
<div>Delivered</div>
</div>

</div>

</div>

<script>

function updateTracking(status){

for(let i=1;i<=5;i++){

document
.getElementById("s"+i)
.classList.remove("active");

}

if(status==="Order Placed"){

document
.getElementById("s1")
.classList.add("active");

}

if(status==="Packed"){

document
.getElementById("s1")
.classList.add("active");

document
.getElementById("s2")
.classList.add("active");

}

if(status==="Shipped"){

document
.getElementById("s1")
.classList.add("active");

document
.getElementById("s2")
.classList.add("active");

document
.getElementById("s3")
.classList.add("active");

}

if(status==="Out For Delivery"){

document
.getElementById("s1")
.classList.add("active");

document
.getElementById("s2")
.classList.add("active");

document
.getElementById("s3")
.classList.add("active");

document
.getElementById("s4")
.classList.add("active");

}

if(status==="Delivered"){

for(let i=1;i<=5;i++){

document
.getElementById("s"+i)
.classList.add("active");

}

}

document
.getElementById("statusText")
.innerHTML = status;

}
async function loadTracking(){

const selectedOrder =
JSON.parse(
localStorage.getItem(
"selectedOrder"
)
);

if(!selectedOrder){

document
.getElementById("orderId")
.innerHTML =
"No Order Found";

return;

}

document
.getElementById("orderId")
.innerHTML =

selectedOrder.orderId ||

selectedOrder.date ||

"URBAN Culture Order";

try{

const res =
await fetch(
"https://urban-culture-xe7v.onrender.com/orders"
);

const orders =
await res.json();

const order =
orders.find(o =>

o.date ===
selectedOrder.date

);

if(order){

updateTracking(

order.status ||
"Order Placed"

);

}else{

updateTracking(
selectedOrder.status ||
"Order Placed"
);

}

}catch(err){

updateTracking(
selectedOrder.status ||
"Order Placed"
);

}

}

window.onload =
loadTracking;

</script>

</body>
</html>
