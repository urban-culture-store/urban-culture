<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
My Profile
</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
min-height:100vh;
}

/* Animated Background */

body::before{

content:"";

position:fixed;

width:450px;
height:450px;

background:
rgba(255,255,255,.05);

filter:blur(120px);

top:-120px;
left:-120px;

animation:
moveGlow 10s infinite alternate;

z-index:-1;

}

@keyframes moveGlow{

0%{
transform:translate(0,0);
}

100%{
transform:translate(180px,120px);
}

}

/* Header */

header{

position:sticky;
top:0;

background:
rgba(0,0,0,.7);

backdrop-filter:
blur(20px);

padding:18px;

display:flex;

justify-content:
space-between;

align-items:center;

border-bottom:
1px solid rgba(255,255,255,.08);

}

.logo{

font-size:26px;
font-weight:800;

}

.back-btn{

background:#111;

padding:12px 16px;

border:none;

border-radius:12px;

color:white;

cursor:pointer;

}

/* Main */

.container{

width:92%;

max-width:900px;

margin:auto;

padding:25px 0;

}

/* Profile Card */

.profile-card{

background:
linear-gradient(
135deg,
rgba(255,255,255,.08),
rgba(255,255,255,.02)
);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:
blur(25px);

padding:30px;

border-radius:30px;

text-align:center;

margin-bottom:25px;

animation:
floatCard 4s ease-in-out infinite;

}

@keyframes floatCard{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0);
}

}

.avatar{

width:120px;
height:120px;

border-radius:50%;

background:#111;

display:flex;

align-items:center;
justify-content:center;

font-size:50px;

margin:auto;

margin-bottom:20px;

border:
2px solid rgba(255,255,255,.1);

}

.name{

font-size:28px;
font-weight:800;

margin-bottom:10px;

}

.phone{

color:#aaa;

font-size:16px;

}

/* Stats */

.stats{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:15px;

margin-bottom:25px;

}

.stat{

background:#111;

padding:20px;

border-radius:20px;

text-align:center;

border:1px solid #222;

}

.stat-number{

font-size:28px;
font-weight:800;

color:#00ff88;

}

.stat-title{

margin-top:8px;

color:#aaa;

font-size:14px;

}

@media(max-width:768px){

.stats{

grid-template-columns:
1fr 1fr 1fr;

}

.name{

font-size:22px;

}

}

</style></head><body>
<header><div class="logo">
URBAN Culture
</div><button
class="back-btn"
onclick="window.location.href='index.html'">

← Home

</button></header><div class="container"><div class="profile-card"><div class="avatar">
👤
</div><div
id="customerName"
class="name">Customer

</div><div
id="customerPhone"
class="phone">+91XXXXXXXXXX

</div></div><div class="stats"><div class="stat"><div
id="ordersCount"
class="stat-number">0

</div><div class="stat-title">Orders

</div></div><div class="stat"><div
id="wishlistCount"
class="stat-number">0

</div><div class="stat-title">Wishlist

</div></div><div class="stat"><div
id="cartCount"
class="stat-number">0

</div><div class="stat-title">Cart

</div></div></div><div
style="
display:grid;
gap:15px;
"><button
onclick="location.href='my-orders.html'"
style="
padding:18px;
border:none;
border-radius:18px;
background:#fff;
color:#000;
font-size:18px;
font-weight:700;
cursor:pointer;
">

📦 My Orders

</button><button
onclick="location.href='wishlist.html'"
style="
padding:18px;
border:none;
border-radius:18px;
background:#111;
color:#fff;
font-size:18px;
font-weight:700;
cursor:pointer;
border:1px solid #222;
">

❤️ Wishlist

</button><button
onclick="location.href='cart.html'"
style="
padding:18px;
border:none;
border-radius:18px;
background:#111;
color:#fff;
font-size:18px;
font-weight:700;
cursor:pointer;
border:1px solid #222;
">

🛒 Cart

</button><button
onclick="logout()"
style="
padding:18px;
border:none;
border-radius:18px;
background:#ff4444;
color:#fff;
font-size:18px;
font-weight:700;
cursor:pointer;
">

🚪 Logout

</button></div></div>
<footer
style="
text-align:center;
padding:40px 20px;
margin-top:40px;
color:#666;
border-top:1px solid rgba(255,255,255,.08);
">© 2026 URBAN Culture

</footer><script>

const customer =

JSON.parse(
localStorage.getItem(
"customer"
)
);

if(!customer){

window.location.href =
"customer-login.html";

}

document.getElementById(
"customerName"
).innerHTML =

customer.name ||
"Customer";

document.getElementById(
"customerPhone"
).innerHTML =

customer.phone ||
"Not Available";

/* Orders Count */

const orders =

JSON.parse(
localStorage.getItem(
"orders"
)
) || [];

document.getElementById(
"ordersCount"
).innerHTML =

orders.length;

/* Wishlist Count */

const wishlist =

JSON.parse(
localStorage.getItem(
"wishlist"
)
) || [];

document.getElementById(
"wishlistCount"
).innerHTML =

wishlist.length;

/* Cart Count */

const cart =

JSON.parse(
localStorage.getItem(
"cart"
)
) || [];

document.getElementById(
"cartCount"
).innerHTML =

cart.length;

function logout(){

if(
confirm(
"Logout from account?"
)
){

localStorage.removeItem(
"customer"
);

window.location.href =
"customer-login.html";

}

}

</script></body>
</html>
