<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:white;
padding:25px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:25px;
}

.search{
display:flex;
gap:10px;
margin-bottom:25px;
}

.search input{
flex:1;
padding:15px;
border:none;
border-radius:15px;
}

.search button{
padding:15px 25px;
border:none;
border-radius:15px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

.order{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.status{
display:inline-block;
padding:8px 15px;
background:#222;
border-radius:10px;
margin-top:10px;
}

.order-card{
background:#111;
border:1px solid #222;
padding:20px;
margin-bottom:15px;
border-radius:20px;
cursor:pointer;
transition:.3s;
}

.order-card:hover{
transform:translateY(-3px);
}

.status{
background:#0f172a;
color:#00ff88;
padding:8px 12px;
border-radius:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>📦 My Orders</h1>


</div>

<div id="orders"></div>

</div>

<script>

async function findOrders(){

const customer =
JSON.parse(localStorage.getItem("customer"));

if(!customer){
window.location.href="customer-login.html";
return;
}

const res = await fetch(
"https://urban-culture.onrender.com/orders"
);

const orders = await res.json();

const filtered = orders.filter(order =>
order.phone === customer.phone
);

let html = "";

if(filtered.length === 0){

html = `
<div style="text-align:center;padding:50px">
<h2>No Orders Yet</h2>
<p>Start Shopping</p>
</div>
`;

}else{

filtered.reverse().forEach((order,index)=>{

html += `

<div class="order-card"
onclick='showOrder(${JSON.stringify(order)})'>

<div style="display:flex;justify-content:space-between;align-items:center">

<div>
<h3>${order.items[0].name}</h3>
<p>${order.date}</p>
<p>₹${order.total}</p>
</div>

<div class="status">
${order.status}
</div>

</div>

</div>

`;

});


}

document.getElementById("orders").innerHTML = html;

}

function showOrder(order){

document.getElementById("modal").style.display="flex";

document.getElementById("modalBody").innerHTML = `

<h2>📦 Order Details</h2>

<hr><br>

<p><b>Order Date:</b> ${order.date}</p>

<p><b>Name:</b> ${order.name}</p>

<p><b>Phone:</b> ${order.phone}</p>

<p><b>Address:</b> ${order.address}</p>

<p><b>Pincode:</b> ${order.pincode}</p>

<p><b>Status:</b> ${order.status}</p>

<p><b>Tracking ID:</b>
${order.trackingId || "Pending"}
</p>

<p><b>Delivery Partner:</b>
${order.deliveryPartner || "Not Assigned"}
</p>

<p><b>Total:</b> ₹${order.total}</p>

<br>

<h3>Products</h3>

${order.items.map(item=>`

<div style="
background:#111;
padding:10px;
margin-top:10px;
border-radius:10px">

${item.name}<br>
₹${item.price}

</div>

`).join("")}

`;

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

window.onload = findOrders;

function showOrder(order){

document.getElementById("modal").style.display="flex";

document.getElementById("modalBody").innerHTML=`

<h2>${order.items[0].name}</h2>

<p><b>Order Date:</b> ${order.date}</p>

<p><b>Address:</b> ${order.address}</p>

<p><b>Pincode:</b> ${order.pincode}</p>

<p><b>Status:</b> ${order.status}</p>

<p><b>Total:</b> ₹${order.total}</p>

<p><b>Delivery Partner:</b>
${order.deliveryPartner || "Not Assigned"}
</p>

<p><b>Tracking ID:</b>
${order.trackingId || "Pending"}
</p>

`;

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>
<div id="modal"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:9999">

<div style="
background:#000;
width:90%;
max-width:600px;
padding:20px;
border-radius:20px;
max-height:80vh;
overflow:auto">

<button
onclick="closeModal()"
style="
float:right;
padding:10px 15px">
✖
</button>

<div id="modalBody"></div>

</div>

</div>

<div id="modal"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:9999">

<div
style="
background:#111;
padding:20px;
width:90%;
max-width:600px;
border-radius:20px">

<button onclick="closeModal()">✖</button>

<div id="modalBody"></div>

</div>

</div>

</body>
</html>
