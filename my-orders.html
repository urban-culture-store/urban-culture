<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - URBAN Culture</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:#fff;
}

.header{
background:#000;
padding:20px;
border-bottom:1px solid #222;
position:sticky;
top:0;
z-index:1000;
}

.title{
font-size:28px;
font-weight:700;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.order-card{
background:#111;
border:1px solid #222;
border-radius:20px;
padding:15px;
margin-bottom:15px;
cursor:pointer;
transition:.3s;
}

.order-card:hover{
transform:translateY(-3px);
}

.order-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.status{
padding:8px 14px;
border-radius:20px;
font-size:13px;
font-weight:700;
background:#0f172a;
color:#00ff88;
}

.product-row{
display:flex;
gap:15px;
align-items:center;
}

.product-img{
width:90px;
height:90px;
object-fit:cover;
border-radius:15px;
background:#222;
}

.product-info{
flex:1;
}

.product-info h3{
font-size:18px;
margin-bottom:5px;
}

.product-info p{
color:#aaa;
font-size:14px;
}

.amount{
font-size:22px;
font-weight:700;
color:#00ff88;
margin-top:5px;
}

.empty{
text-align:center;
padding:80px 20px;
}

.empty h2{
margin-bottom:10px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background:#111;
width:90%;
max-width:600px;
padding:20px;
border-radius:20px;
max-height:85vh;
overflow:auto;
}

.close-btn{
background:red;
color:#fff;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
float:right;
}

.detail-box{
background:#1a1a1a;
padding:12px;
border-radius:12px;
margin-top:10px;
}

.order-actions{
margin-top:15px;
}

.track-btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<div class="title">
📦 My Orders
</div>
</div>

<div class="container">
<div id="orders"></div>
</div>
<div class="modal" id="modal">

<div class="modal-content">

<button
class="close-btn"
onclick="closeModal()">
✖
</button>

<div id="modalBody"></div>

</div>

</div>

<script>

async function findOrders(){

const customer =
JSON.parse(
localStorage.getItem("customer")
);

if(!customer){

window.location.href =
"customer-login.html";

return;

}

const res = await fetch(
"https://urban-culture.onrender.com/orders"
);

const orders =
await res.json();

const filtered =
orders.filter(order =>

order.phone === customer.phone

);

let html = "";

if(filtered.length===0){

html = `

<div class="empty">

<h2>No Orders Yet</h2>

<p>
Start Shopping
</p>

</div>

`;

}else{

filtered.reverse().forEach(order=>{

html += `

<div
class="order-card"
onclick='showOrder(${JSON.stringify(order)})'>

<p>
<b>Tracking ID:</b>
${order.trackingId || "Pending"}
</p>

<p>
<b>Delivery Partner:</b>
${order.deliveryPartner || "Not Assigned"}
</p>

<button
onclick='trackOrder("${order.orderId}")'
style="
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
font-weight:bold;">

🚚 Track Order

</button>

<div class="order-actions">


</div>

<div class="order-top">

<div>

<b>
${order.date}
</b>

</div>

<div class="status">

${order.status || "Pending"}

</div>

</div>

<div class="product-row">

<img
class="product-img"
src="${
order.items[0]?.image ||
'https://via.placeholder.com/300'
}">

<div class="product-info">

<h3>
${order.items[0]?.name || "Product"}
</h3>

<p>
${order.address}
</p>

<div class="amount">

₹${order.total}

</div>

</div>

</div>

</div>
<div class="amount">

₹${order.total}

</div>

</div>

</div>

<div class="order-actions">

<button
class="track-btn"
onclick='event.stopPropagation();
trackOrder("${order.orderId}")'>

🚚 Track Order

</button>

</div>

</div>
`;

});

}

document.getElementById(
"orders"
).innerHTML = html;

}

window.onload =
findOrders;
function trackOrder(orderId){

localStorage.setItem(
"trackingOrderId",
orderId
);

window.location.href =
"my-orders.html";

}
function showOrder(order){

localStorage.setItem(
"selectedOrder",
JSON.stringify(order)
);

document.getElementById(
"modal"
).style.display="flex";

document.getElementById(
"modalBody"
).innerHTML = `

<h2>
📦 Order Details
</h2>

<div class="detail-box">

<p>
<b>Order Date:</b>
${order.date}
</p>

<p>
<b>Name:</b>
${order.name}
</p>

<p>
<b>Phone:</b>
${order.phone}
</p>

<p>
<b>Address:</b>
${order.address}
</p>

<p>
<b>Pincode:</b>
${order.pincode}
</p>

<p>
<b>Status:</b>
${order.status || "Pending"}
</p>

<p>
<b>Total:</b>
₹${order.total}
</p>

</div>

<div class="detail-box">

<p>
<b>Tracking ID:</b>
${order.trackingId || "Pending"}
</p>

<p>
<b>Delivery Partner:</b>
${order.deliveryPartner || "Not Assigned"}
</p>

<br>

<button
onclick="window.location.href='track-order.html'"
style="
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;">
🚚 Track Order
</button>

</div>

<h3 style="margin-top:20px">
Products
</h3>

${order.items.map(item => `

<div class="detail-box">

<p>
<b>${item.name}</b>
</p>

<p>
₹${item.price}
</p>

<p>
Category:
${item.category || "Product"}
</p>

</div>

`).join("")}

`;

}

function closeModal(){

document.getElementById(
"modal"
).style.display="none";

}

</script>

</body>
</html>
