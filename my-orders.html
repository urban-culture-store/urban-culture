<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
My Orders
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

.container{
width:95%;
max-width:1400px;
margin:auto;
padding:20px 0;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.title{
font-size:42px;
font-weight:800;
}

.back-btn{
padding:14px 18px;
background:#111;
border:none;
border-radius:14px;
color:white;
cursor:pointer;
font-weight:700;
}

.orders{
display:grid;
gap:20px;
}

.order-card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:25px;
overflow:hidden;
transition:.3s;
}

.order-card:hover{
transform:translateY(-4px);
}

.order-top{
display:flex;
gap:20px;
padding:20px;
}

.order-image{
width:130px;
height:130px;
object-fit:cover;
border-radius:18px;
background:#111;
}

.order-details{
flex:1;
}

.order-name{
font-size:24px;
font-weight:700;
margin-bottom:10px;
}

.order-price{
font-size:26px;
font-weight:800;
margin-bottom:10px;
}

.order-id{
color:#aaa;
margin-bottom:10px;
}

.order-date{
color:#888;
font-size:14px;
margin-bottom:10px;
}

.order-status{
display:inline-block;
padding:8px 14px;
border-radius:12px;
background:#00ff88;
color:black;
font-weight:700;
}

.actions{
display:flex;
gap:10px;
padding:20px;
border-top:1px solid rgba(255,255,255,.08);
}

.action-btn{
flex:1;
padding:14px;
border:none;
border-radius:14px;
font-weight:700;
cursor:pointer;
}

.track-btn{
background:white;
color:black;
}

.bill-btn{
background:#111;
color:white;
border:1px solid #333;
}

.cancel-btn{
background:#ff0033;
color:white;
}

.empty{
text-align:center;
padding:80px 20px;
color:#888;
}

@media(max-width:768px){

.order-top{
flex-direction:column;
}

.order-image{
width:100%;
height:250px;
}

.title{
font-size:30px;
}

.actions{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1 class="title">
My Orders
</h1>

<button
class="back-btn"
onclick="location.href='profile.html'">

← Profile

</button>

</div>

<div
id="orders"
class="orders">

</div>
<script>

async function loadOrders(){

const container =
document.getElementById(
"orders"
);

try{

const response =
await fetch(
"https://urban-culture.onrender.com/orders"
);

const orders =
await response.json();

const customer =
localStorage.getItem(
"customer"
);

const myOrders =
orders.filter(
o => o.customer === customer
);

if(myOrders.length===0){

container.innerHTML =

`

<div class="empty">

<h2>
No Orders Yet
</h2>

<p>
Start shopping to see your orders here.
</p>

</div>

`;

return;

}

let html = "";

myOrders.reverse().forEach(
(order,index)=>{

const image =

order.items &&
order.items[0] &&
order.items[0].image

?

order.items[0].image

:

"https://via.placeholder.com/300";

const productName =

order.items &&
order.items[0] &&
order.items[0].name

?

order.items[0].name

:

"Product";

html += `

<div class="order-card">

<div class="order-top">

<img
class="order-image"
src="${image}">

<div class="order-details">

<div class="order-name">

${productName}

</div>

<div class="order-price">

₹${order.total || 0}

</div>

<div class="order-id">

Order ID:
${order._id}

</div>

<div class="order-date">

${order.date || ""}

</div>

<div class="order-status">

${order.status || "Order Placed"}

</div>

</div>

</div>

<div class="actions">

<button
class="action-btn track-btn"
onclick="trackOrder('${order._id}')">

📦 Track Order

</button>

<button
class="action-btn bill-btn"
onclick="downloadBill('${order._id}')">

📄 Download Bill

</button>

<button
class="action-btn cancel-btn"
onclick="cancelOrder('${order._id}')">

❌ Cancel

</button>

</div>

</div>

`;

});

container.innerHTML = html;

}catch(err){

console.log(err);

container.innerHTML =

`

<div class="empty">

<h2>
Failed To Load Orders
</h2>

</div>

`;

}

}

function trackOrder(id){

localStorage.setItem(
"selectedOrder",
id
);

window.location.href =
"track-order.html";

}
function downloadBill(id){

window.open(
"bill.html?id="+id,
"_blank"
);

}

/* Cancel Order */

async function cancelOrder(id){

if(
!confirm(
"Cancel this order?"
)
){
return;
}

try{

await fetch(
`https://urban-culture.onrender.com/orders/${id}`,
{
method:"DELETE"
}
);

alert(
"Order Cancelled"
);

loadOrders();

}catch(err){

console.log(err);

alert(
"Failed To Cancel Order"
);

}

}

/* Load Orders */

loadOrders();

</script>

</body>
</html>
