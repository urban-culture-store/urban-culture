<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
My Orders
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#050505;
color:white;

overflow-x:hidden;

}

.container{

width:95%;
max-width:1400px;

margin:auto;

padding:20px 0;

}

.header{

display:flex;

justify-content:
space-between;

align-items:center;

margin-bottom:30px;

}

.title{

font-size:42px;

font-weight:800;

}

.back-btn{

padding:14px 18px;

background:#111;

border:none;

border-radius:14px;

color:white;

cursor:pointer;

}

/* Orders */

.orders{

display:grid;

gap:20px;

}

.order-card{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

border-radius:25px;

overflow:hidden;

}

.order-top{

display:flex;

gap:20px;

padding:20px;

}

.order-image{

width:120px;
height:120px;

object-fit:cover;

border-radius:18px;

background:#111;

}

.order-details{

flex:1;

}

.order-name{

font-size:22px;

font-weight:700;

margin-bottom:10px;

}

.order-price{

font-size:24px;

font-weight:800;

margin-bottom:10px;

}

.order-status{

display:inline-block;

padding:8px 14px;

border-radius:12px;

background:#00ff88;

color:black;

font-weight:700;

}

.actions{

display:flex;

gap:10px;

padding:20px;

border-top:
1px solid rgba(255,255,255,.08);

}

.action-btn{

flex:1;

padding:14px;

border:none;

border-radius:14px;

font-weight:700;

cursor:pointer;

}

.track-btn{

background:white;

color:black;

}

.bill-btn{

background:#111;

color:white;

border:1px solid #333;

}

.empty{

text-align:center;

padding:80px 20px;

color:#888;

}

@media(max-width:768px){

.order-top{

flex-direction:column;

}

.order-image{

width:100%;
height:250px;

}

.title{

font-size:32px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1 class="title">
My Orders
</h1>

<button
class="back-btn"
onclick="location.href='profile.html'">

← Profile

</button>

</div>

<div
id="orders"
class="orders">

</div>
<script>

function loadOrders(){

const container =
document.getElementById(
"orders"
);

const orders =

JSON.parse(
localStorage.getItem(
"orders"
)
) || [];

if(orders.length===0){

container.innerHTML =

`

<div class="empty">

<h2>
No Orders Yet
</h2>

<p>
Start shopping to see your orders here.
</p>

</div>

`;

return;

}

let html = "";

orders.reverse().forEach(
(order,index)=>{

html += `

<div class="order-card">

<div class="order-top">

<img
class="order-image"
src="${order.image || ''}">

<div class="order-details">

<div class="order-name">

${order.name || "Product"}

</div>

<div class="order-price">

₹${order.price || 0}

</div>

<div class="order-status">

${order.status || "Order Placed"}

</div>

<br><br>

<div>

Order ID:
${order.orderId || ("UC"+index)}

</div>

</div>

</div>

<div class="actions">

<button
class="action-btn track-btn"
onclick="trackOrder(${index})">

📦 Track Order

</button>

<button
class="action-btn bill-btn"
onclick="downloadBill(${index})">

📄 Download Bill

</button>

</div>

</div>

`;

});

container.innerHTML = html;

}

function trackOrder(index){

localStorage.setItem(
"selectedOrder",
index
);

window.location.href =
"track-order.html";

}

function downloadBill(index){

const orders =
JSON.parse(
localStorage.getItem(
"orders"
)
) || [];

const order =
orders[index];

const billWindow =
window.open(
"",
"_blank"
);

billWindow.document.write(

`
<h1>URBAN Culture</h1>

<hr>

<h2>Invoice</h2>

<p>
Order ID:
${order.orderId || "N/A"}
</p>

<p>
Product:
${order.name}
</p>

<p>
Price:
₹${order.price}
</p>

<p>
Status:
${order.status || "Order Placed"}
</p>

<p>
Customer:
${order.customerName || "Customer"}
</p>

<hr>

<h3>
Thank You For Shopping
</h3>

`
);

billWindow.print();

}

loadOrders();

</script>

</body>
</html>
