<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Manage Products
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
}

.container{

width:95%;
max-width:1400px;

margin:auto;

padding:25px;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

}

.title{

font-size:42px;
font-weight:800;

}

.add-btn{

background:white;
color:black;

padding:14px 20px;

border:none;

border-radius:14px;

font-weight:700;

cursor:pointer;

}

.search{

width:100%;

padding:16px;

background:#111;

border:none;

border-radius:16px;

color:white;

margin-bottom:25px;

}

#products{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(280px,1fr));

gap:20px;

}

.card{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

border-radius:24px;

overflow:hidden;

}

.card img{

width:100%;
height:220px;

object-fit:cover;

background:#111;

}

.info{

padding:18px;

}

.name{

font-size:20px;

font-weight:700;

margin-bottom:10px;

}

.price{

font-size:24px;

font-weight:800;

margin-bottom:10px;

}

.stock{

color:#aaa;

margin-bottom:15px;

}

.actions{

display:flex;
gap:10px;

}

.edit-btn,
.delete-btn{

flex:1;

padding:12px;

border:none;

border-radius:12px;

font-weight:700;

cursor:pointer;

}

.edit-btn{

background:white;
color:black;

}

.delete-btn{

background:#ff3b30;
color:white;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1 class="title">
Manage Products
</h1>

<button
class="add-btn"
onclick="location.href='add-product.html'">

+ Add Product

</button>

</div>

<input
id="search"
class="search"
placeholder="Search Products..."
onkeyup="filterProducts()">

<div
class="count-card">

Total Products :

<span id="productCount">
0
</span>

</div>

<div id="products">

</div>
<script>

let allProducts = [];

async function loadProducts(){

try{

const response =
await fetch(
"https://urban-culture.onrender.com/products"
);

const products =
await response.json();

allProducts = products;

renderProducts(products);

}catch(err){

document.getElementById(
"products"
).innerHTML =

"<h2>Failed To Load Products</h2>";

console.log(err);

}

}

function renderProducts(products){

const container =
document.getElementById(
"products"
);

if(products.length===0){

container.innerHTML =

"<h2>No Products Found</h2>";

return;

}

let html = "";

products.forEach(
(product,index)=>{

html += `

<div class="card">

<img
src="${product.image}"
alt="${product.name}">

<div class="info">

<div class="name">

${product.name}

</div>

<div class="price">

₹${product.price}

</div>

<div class="stock">

Stock :
${product.stock || 0}

</div>

<div class="actions">

<button
class="edit-btn"
onclick="editProduct(${index})">

Edit

</button>

<button
class="delete-btn"
onclick="deleteProduct(${index})">

Delete

</button>

</div>

</div>

</div>

`;

});

container.innerHTML = html;

}

function filterProducts(){

const search =

document.getElementById(
"search"
).value.toLowerCase();

const filtered =

allProducts.filter(product=>

product.name
.toLowerCase()
.includes(search)

);

renderProducts(filtered);

}

function editProduct(index){

const product =
allProducts[index];

localStorage.setItem(

"editProduct",

JSON.stringify(product)

);

window.location.href =
"add-product.html";

}

function deleteProduct(index){

const confirmDelete =
confirm(
"Delete Product?"
);

if(!confirmDelete){

return;

}

allProducts.splice(
index,
1
);

renderProducts(
allProducts
);

alert(
"Product Removed Locally"
);

}

loadProducts();

</script>
<style>

.count-card{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

padding:20px;

border-radius:20px;

margin-bottom:20px;

font-size:22px;

font-weight:700;

}

.featured{

display:inline-block;

padding:6px 10px;

background:white;

color:black;

border-radius:10px;

font-size:12px;

font-weight:700;

margin-bottom:10px;

}

</style>

<script>

/* Update Product Count */

function updateCount(){

document.getElementById(
"productCount"
).innerHTML =

allProducts.length;

}

/* Replace renderProducts */

const oldRender =
renderProducts;

renderProducts = function(products){

const container =
document.getElementById(
"products"
);

if(products.length===0){

container.innerHTML =
"<h2>No Products Found</h2>";

return;

}

let html = "";

products.forEach(
(product,index)=>{

html += `

<div class="card">

<img
src="${product.image}"
alt="${product.name}">

<div class="info">

${product.featured==="Yes"

? '<div class="featured">FEATURED</div>'

: ''

}

<div class="name">

${product.name}

</div>

<div class="price">

₹${product.price}

</div>

<div class="stock">

Stock :
${product.stock || 0}

</div>

<div class="actions">

<button
class="edit-btn"
onclick="editProduct(${index})">

Edit

</button>

<button
class="delete-btn"
onclick="deleteProduct(${index})">

Delete

</button>

</div>

</div>

</div>

`;

});

container.innerHTML = html;

updateCount();

};

</script>

<div
class="count-card">

Total Products :

<span id="productCount">

0

</span>

</div>

</body>
</html>
