<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Manage Products
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
}

.header{

display:flex;

justify-content:
space-between;

align-items:center;

padding:20px;

border-bottom:
1px solid #222;

background:#000;

position:sticky;

top:0;

z-index:100;

}

.logo{

font-size:30px;

font-weight:800;

}

.header-actions{

display:flex;

gap:10px;

}

.back-btn,
.add-btn{

border:none;

padding:12px 18px;

border-radius:12px;

cursor:pointer;

font-weight:700;

}

.back-btn{

background:#111;
color:white;

}

.add-btn{

background:white;
color:black;

}

.container{

width:95%;

max-width:1400px;

margin:25px auto;

}

.search{

width:100%;

padding:16px;

background:#111;

border:none;

border-radius:15px;

color:white;

font-size:16px;

margin-bottom:20px;

outline:none;

}

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

margin-bottom:25px;

}

.stat-card{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

padding:20px;

border-radius:20px;

}

.stat-title{

color:#aaa;

font-size:14px;

margin-bottom:8px;

}

.stat-value{

font-size:30px;

font-weight:800;

}

#products{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(300px,1fr));

gap:20px;

}
.stat-card{

backdrop-filter:blur(12px);

}

.card{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

border-radius:22px;

overflow:hidden;

transition:.3s;

}

.card:hover{

transform:translateY(-4px);

}

.card img{

width:100%;

height:240px;

object-fit:cover;

background:#111;

}

.info{

padding:18px;

}

.badge{

display:inline-block;

padding:6px 10px;

border-radius:10px;

font-size:12px;

font-weight:700;

margin-bottom:10px;

background:white;

color:black;

}

.name{

font-size:20px;

font-weight:700;

margin-bottom:10px;

}

.price{

font-size:26px;

font-weight:800;

margin-bottom:8px;

}

.stock{

color:#aaa;

margin-bottom:8px;

}

.category{

font-size:14px;

color:#ccc;

margin-bottom:15px;

}

.actions{

display:flex;

gap:10px;

}

.edit-btn,
.delete-btn{

flex:1;

border:none;

padding:12px;

border-radius:12px;

font-weight:700;

cursor:pointer;

}

.edit-btn{

background:white;

color:black;

}

.delete-btn{

background:#ff3b30;

color:white;

}

.empty{

text-align:center;

padding:50px;

color:#888;

font-size:20px;

}

</style>

</head>

<body>

<div class="header">

<div class="logo">
URBAN Culture
</div>

<div class="header-actions">

<button
class="back-btn"
onclick="location.href='dashboard.html'">

← Dashboard

</button>

<button
class="add-btn"
onclick="location.href='add-product.html'">

+ Add Product

</button>

</div>

</div>

<div class="container">

<input
type="text"
id="search"
class="search"
placeholder="Search Products..."
onkeyup="filterProducts()">

<div class="stats">

<div class="stat-card">

<div class="stat-title">
Total Products
</div>

<div
class="stat-value"
id="productCount">

0

</div>

</div>

</div>

<div id="products">

</div>

</div>
<script>

const API = "https://urban-culture-xe7v.onrender.com";

let allProducts = [];


/* LOAD PRODUCTS */

async function loadProducts(){

try{

const response =
await fetch(
`${API}/products`
);

const products =
await response.json();

allProducts = products;

renderProducts(products);

}
catch(err){

console.log(err);

document.getElementById(
"products"
).innerHTML =

'<div class="empty">Failed To Load Products</div>';

}

}


/* RENDER PRODUCTS */

function renderProducts(products){

document.getElementById(
"productCount"
).innerHTML =
products.length;

const container =
document.getElementById(
"products"
);

if(products.length===0){

container.innerHTML =

'<div class="empty">No Products Found</div>';

return;

}

let html = "";

products.forEach(
(product,index)=>{

html += `

<div class="card">

<img
src="${product.image || ''}"
alt="${product.name}">

<div class="info">

${product.featured==="Yes"

? '<div class="badge">FEATURED</div>'

: ''

}

<div class="name">
${product.name}
</div>

<div class="price">
₹${product.price}
</div>

<div class="stock">
Stock : ${product.stock}
</div>

<div class="category">
${product.category}
</div>

<div class="actions">

<button
class="edit-btn"
onclick="editProduct(${index})">

Edit

</button>

<button
class="delete-btn"
onclick="deleteProduct(${index})">

Delete

</button>

</div>

</div>

</div>

`;

});

container.innerHTML = html;

}


/* SEARCH */

function filterProducts(){

const search =

document.getElementById(
"search"
).value.toLowerCase();

const filtered =

allProducts.filter(product=>

(product.name || "")
.toLowerCase()
.includes(search)

);

renderProducts(filtered);

}


/* EDIT */

function editProduct(index){

const product =
allProducts[index];

if(!product){

alert(
"Product Not Found"
);

return;

}

localStorage.setItem(
"editProduct",
JSON.stringify(product)
);

location.href =
"add-product.html";

}


/* DELETE */

async function deleteProduct(index){

const confirmDelete =
confirm(
"Delete Product ?"
);

if(!confirmDelete){
return;
}

try{

const response =
await fetch(
`${API}/products/${allProducts[index]._id}`
{
method:"DELETE"
}
);

const result =
await response.json();

alert(
result.message ||
"Product Deleted"
);

await loadProducts();

}
catch(err){

console.log(err);

alert(
"Delete Failed"
);

}

}


/* AUTO REFRESH */

setInterval(()=>{

loadProducts();

},5000);


/* INITIAL LOAD */

loadProducts();

</script>

</body>
</html>
