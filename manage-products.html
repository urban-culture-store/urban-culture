<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Manage Products
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
}

header{

position:sticky;
top:0;

background:
rgba(0,0,0,.8);

backdrop-filter:
blur(20px);

padding:20px;

display:flex;

justify-content:space-between;
align-items:center;

border-bottom:
1px solid #222;

z-index:100;

}

.logo{

font-size:28px;
font-weight:800;

}

.back-btn{

background:#111;

color:white;

padding:12px 18px;

border:none;

border-radius:12px;

cursor:pointer;

}

.container{

width:95%;
max-width:1400px;

margin:auto;

padding:25px 0;

}

.top-bar{

display:flex;
gap:15px;

margin-bottom:25px;

flex-wrap:wrap;

}

.search{

flex:1;

min-width:250px;

padding:15px;

background:#111;

border:1px solid #222;

border-radius:15px;

color:white;

font-size:16px;

}

.add-btn{

background:white;

color:black;

padding:15px 25px;

border:none;

border-radius:15px;

font-weight:700;

cursor:pointer;

}

.products{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(300px,1fr));

gap:25px;

}

.card{

background:
linear-gradient(
135deg,
rgba(255,255,255,.08),
rgba(255,255,255,.02)
);

border:
1px solid rgba(255,255,255,.08);

border-radius:25px;

overflow:hidden;

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

.product
<script>

let allProducts = [];

async function loadProducts(){

try{

const res = await fetch(
"https://urban-culture.onrender.com/products"
);

const products =
await res.json();

allProducts = products;

renderProducts(products);

}catch(err){

document.getElementById(
"products"
).innerHTML =

"<h2>Failed To Load Products</h2>";

}

}

function renderProducts(products){

let html = "";

products.forEach((product,index)=>{

html += `

<div class="card">

<img
class="product-image"
src="${product.image}">

<div class="info">

<div class="name">
${product.name}
</div>

<div class="price">
₹${product.price}
</div>

<div class="stock">
Stock : ${product.stock}
</div>

<div class="actions">

<button
class="edit-btn"
onclick="editProduct(${index})">

Edit

</button>

<button
class="delete-btn"
onclick="deleteProduct(${index})">

Delete

</button>

</div>

</div>

</div>

`;

});

document.getElementById(
"products"
).innerHTML = html;

}

function filterProducts(){

const search =
document.getElementById(
"search"
).value.toLowerCase();

const filtered =

allProducts.filter(product =>

product.name
.toLowerCase()
.includes(search)

);

renderProducts(filtered);

}

function editProduct(index){

const product =
allProducts[index];

const newName =
prompt(
"Product Name",
product.name
);

if(newName===null) return;

const newPrice =
prompt(
"Price",
product.price
);

if(newPrice===null) return;

product.name =
newName;

product.price =
newPrice;

alert(
"Edit UI Ready\nBackend update next step."
);

renderProducts(
allProducts
);

}

function deleteProduct(index){

if(
!confirm(
"Delete Product?"
)
){
return;
}

allProducts.splice(
index,
1
);

renderProducts(
allProducts
);

alert(
"Deleted Locally"
);

}

loadProducts();

</script>

</body>
</html>
