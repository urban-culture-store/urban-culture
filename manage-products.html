<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Products</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:#fff;
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:32px;
font-weight:700;
}

.add-btn{
background:#fff;
color:#000;
border:none;
padding:12px 20px;
border-radius:15px;
font-weight:bold;
cursor:pointer;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:15px;
margin-bottom:25px;
font-size:16px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
overflow:hidden;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
background:#111;
}

.info{
padding:20px;
}

.name{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.price{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

.category{
color:#aaa;
margin-bottom:15px;
}

.actions{
display:flex;
gap:10px;
}

.edit{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:#fff;
color:#000;
font-weight:bold;
cursor:pointer;
}

.delete{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:red;
color:white;
font-weight:bold;
cursor:pointer;
}

#editModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
}

.modal-box{
width:90%;
max-width:500px;
background:#111;
padding:25px;
border-radius:20px;
}

.modal-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:12px;
}

.save-btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<div class="logo">Manage Products</div>

<button
class="add-btn"
onclick="window.location.href='add-product.html'">

* Add Product

  </button>

</div>

<input
class="search"
id="search"
placeholder="Search Products..."
onkeyup="filterProducts()">

<div
class="products"
id="products">
</div>

<div id="editModal">

<div class="modal-box">

<h2>Edit Product</h2>

<input id="editName" placeholder="Product Name">

<input id="editPrice" placeholder="Price">

<button
class="save-btn"
onclick="saveEdit()">
Save Changes </button>

</div>

</div>

<script>

let allProducts=[];
let currentIndex=-1;

async function loadProducts(){

const res=
await fetch("https://urban-culture.onrender.com/products");

const products=
await res.json();

allProducts=products;

renderProducts(products);

}

function renderProducts(products){

let html="";

products.forEach((product,index)=>{

html+=`

<div class="card">

<img
src="${product.image || 'https://via.placeholder.com/300'}">

<div class="info">

<div class="name">
${product.name}
</div>

<div class="price">
₹${product.price}
</div>

<div class="category">
${product.category}
</div>

<div class="actions">

<button
class="edit"
onclick="editProduct(${index})">
Edit
</button>

<button
class="delete"
onclick="deleteProduct(${index})">
Delete
</button>

</div>

</div>

</div>

`;

});

document.getElementById("products")
.innerHTML=html;

}

function filterProducts(){

const text=
document.getElementById("search")
.value
.toLowerCase();

const filtered=
allProducts.filter(product=>

product.name
.toLowerCase()
.includes(text)

);

renderProducts(filtered);

}

function editProduct(index){

currentIndex=index;

document.getElementById("editName").value=
allProducts[index].name;

document.getElementById("editPrice").value=
allProducts[index].price;

document.getElementById("editModal").style.display="flex";

}

function saveEdit(){

allProducts[currentIndex].name=
document.getElementById("editName").value;

allProducts[currentIndex].price=
document.getElementById("editPrice").value;

alert("Edit Saved");

document.getElementById("editModal").style.display="none";

renderProducts(allProducts);

}

async function deleteProduct(index){

if(!confirm("Delete Product?")){
return;
}

await fetch(
`https://urban-culture.onrender.com/products/${index}`,
{
method:"DELETE"
}
);

loadProducts();

}

loadProducts();

</script>

</body>
</html>
