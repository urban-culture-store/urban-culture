<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenue Analytics</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:white;
padding:25px;
}

.title{
font-size:35px;
font-weight:bold;
margin-bottom:25px;
text-align:center;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:25px;
text-align:center;
backdrop-filter:blur(20px);
}

.card h2{
margin-top:10px;
font-size:30px;
}

.chart{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:25px;
}

.bar{
height:35px;
background:white;
margin:15px 0;
border-radius:10px;
}

.label{
margin-bottom:5px;
}

</style>

</head>

<body>

<div class="title">
📊 Revenue Analytics
</div>

<div class="cards">

<div class="card">
<h3>Total Revenue</h3>
<h2 id="revenue">₹0</h2>
</div>

<div class="card">
<h3>Total Orders</h3>
<h2 id="orders">0</h2>
</div>

<div class="card">
<h3>Delivered</h3>
<h2 id="delivered">0</h2>
</div>

</div>

<div class="chart">

<h2>Sales Overview</h2>

<div id="chartData"></div>

</div>
<script>

async function loadAnalytics(){

try{

const res =
await fetch(
"https://urban-culture-xe7v.onrender.com/orders"
);

const ordersData =
await res.json();

let revenue = 0;
let delivered = 0;

ordersData.forEach(order=>{

revenue +=
Number(order.total || 0);

if(
order.status === "Delivered"
){
delivered++;
}

});

document.getElementById(
"revenue"
).innerHTML =
"₹" + revenue;

document.getElementById(
"orders"
).innerHTML =
ordersData.length;

document.getElementById(
"delivered"
).innerHTML =
delivered;

let chartHTML = "";

ordersData.forEach((order,index)=>{

const width =
Math.max(
50,
(order.total || 0) / 10
);

chartHTML += `

<div class="label">
Order ${index + 1}
- ₹${order.total || 0}
</div>

<div
class="bar"
style="
width:${width}px;
">
</div>

`;

});

document.getElementById(
"chartData"
).innerHTML =
chartHTML;

}catch(err){

console.log(err);

}

}

loadAnalytics();

</script>

</body>
</html>
