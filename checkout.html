<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - URBAN Culture</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

h1{
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#334155;
color:white;
}

.summary-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #334155;
}

.total{
font-size:22px;
font-weight:bold;
margin-top:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#ef4444;
color:white;
font-size:18px;
cursor:pointer;
margin-top:15px;
}
</style>

</head>
<body>

<div class="container">

<h1>Checkout</h1>

<div class="card">

<h2>Customer Details</h2>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="tel"
id="phone"
placeholder="Phone Number">

<textarea
id="address"
placeholder="Delivery Address">
</textarea>

</div>

<div class="card">

<h2>Order Summary</h2>

<div id="orderItems">
Loading...
</div>

<div
class="total"
id="totalAmount">
₹0
</div>

<button onclick="placeOrder()">
Place Order
</button>

</div>

</div>
<script>

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

let total = 0;

function loadCart(){

const orderItems =
document.getElementById(
"orderItems"
);

if(cart.length === 0){

orderItems.innerHTML =
"<h3>Cart Empty</h3>";

return;
}

let html = "";

total = 0;

cart.forEach(product=>{

const price =
Number(product.price) || 0;

total += price;

html += `

<div class="summary-item">

<span>
${product.name}
</span>

<span>
₹${price}
</span>

</div>

`;

});

orderItems.innerHTML = html;

document.getElementById(
"totalAmount"
).innerHTML =
"₹" + total;

}

async function placeOrder(){

const name =
document.getElementById(
"name"
).value;

const phone =
document.getElementById(
"phone"
).value;

const address =
document.getElementById(
"address"
).value;

if(
!name ||
!phone ||
!address
){

alert(
"Fill All Fields"
);

return;
}

const order = {

name:name,

phone:phone,

address:address,

items:cart,

total:total,

date:new Date()
.toLocaleString()

};

try{

const response =
await fetch(
"https://urban-culture-xe7v.onrender.com/orders",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify(
order
)
}
);

if(response.ok){

alert(
"✅ Order Placed Successfully"
);

localStorage.removeItem(
"cart"
);

window.location.href =
"index.html";

}else{

alert(
"❌ Order Failed"
);

}

}catch(err){

console.log(err);

alert(
"❌ Server Error"
);

}

}

loadCart();

</script>

</body>
</html>
