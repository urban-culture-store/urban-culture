<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>URBAN Culture Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.title{
font-size:32px;
font-weight:bold;
}

.logout{
background:white;
color:black;
border:none;
padding:12px 25px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.2);
padding:25px;
border-radius:20px;
text-align:center;
}

.card h2{
font-size:35px;
margin-top:10px;
}

.table-box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
padding:20px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:white;
color:black;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.delete-btn{
background:red;
color:white;
border:none;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("admin") !== "true"){
window.location.href="admin-login.html";
}

function logout(){
localStorage.removeItem("admin");
window.location.href="admin-login.html";
}

</script>

<div class="header">
<div class="title">
URBAN Culture Dashboard
</div>

<button class="logout" onclick="logout()">
Logout
</button>
</div>

<div class="cards">

<div class="card">
<h3>Total Orders</h3>
<h2 id="orderCount">0</h2>
</div>

<div class="card">
<h3>Total Products</h3>
<h2 id="productCount">0</h2>
</div>

<div class="card">
<h3>Admin Status</h3>
<h2>ONLINE</h2>
</div>

</div>

<div class="table-box">

<table>

<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Phone</th>
<th>Address</th>
<th>Items</th>
<th>Action</th>
</tr>
</thead>

<tbody id="ordersTable">
</tbody>

</table>

</div>

<script>

async function loadOrders(){

const res =
await fetch("https://urban-culture.onrender.com/orders");

const orders =
await res.json();

document.getElementById("orderCount").innerHTML =
orders.length;

let html = "";

orders.forEach((order,index)=>{

html += `
<tr>
<td>${index+1}</td>
<td>${order.name}</td>
<td>${order.phone}</td>
<td>${order.address}</td>
<td>${order.items.length}</td>
<td>
<button class="delete-btn">
Delete
</button>
</td>
</tr>
`;

});

document.getElementById("ordersTable").innerHTML =
html;

}

async function loadProducts(){

const res =
await fetch("https://urban-culture.onrender.com/products");

const products =
await res.json();

document.getElementById("productCount").innerHTML =
products.length;

}

loadOrders();
loadProducts();

</script>

</body>
</html>
