<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN Culture Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:white;
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:32px;
font-weight:bold;
}

.logout{
background:white;
color:black;
border:none;
padding:12px 20px;
border-radius:15px;
cursor:pointer;
font-weight:bold;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:25px;
text-align:center;
}

.card h3{
margin-bottom:10px;
color:#aaa;
}

.card h1{
font-size:34px;
}

.table-box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
padding:20px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
padding:15px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,0.1);
}

td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.status{
padding:6px 12px;
border-radius:10px;
background:#222;
display:inline-block;
}

.delete-btn{
background:red;
color:white;
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("admin") !== "true"){
window.location.href="admin-login.html";
}

function logout(){
localStorage.removeItem("admin");
window.location.href="admin-login.html";
}

</script>

<div class="header">

<div class="logo">
📊 Dashboard
</div>

<button
class="logout"
onclick="logout()">
Logout </button>

</div>

<div class="cards">

<div class="card">
<h3>Total Revenue</h3>
<h1 id="revenue">₹0</h1>
</div>

<div class="card">
<h3>Total Orders</h3>
<h1 id="ordersCount">0</h1>
</div>

<div class="card">
<h3>Pending</h3>
<h1 id="pendingCount">0</h1>
</div>

<div class="card">
<h3>Delivered</h3>
<h1 id="deliveredCount">0</h1>
</div>

<div class="card">
<h3>Products</h3>
<h1 id="productsCount">0</h1>
</div>

</div>

<div class="table-box">

<table>

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="ordersTable">
</tbody>

</table>

</div>

<script>

async function loadDashboard(){

// Orders
const orderRes =
await fetch("https://urban-culture-xe7v.onrender.com/orders");

const orders =
await orderRes.json();

let revenue = 0;

let pending = 0;

let delivered = 0;

let html = "";

orders.forEach((order,index)=>{

revenue += Number(order.total || 0);

if(order.status === "Pending"){
pending++;
}

if(order.status === "Delivered"){
delivered++;
}

html += `
<tr>

<td>${order.name}</td>

<td>${order.phone}</td>

<td>₹${order.total || 0}</td>

<td>
<span class="status">
${order.status || "Pending"}
</span>
</td>

<td>
<button
class="delete-btn"
onclick="deleteOrder(${index})">
Delete
</button>
</td>

</tr>
`;

});

document.getElementById("ordersTable")
.innerHTML = html;

document.getElementById("revenue")
.innerHTML = "₹" + revenue;

document.getElementById("ordersCount")
.innerHTML = orders.length;

document.getElementById("pendingCount")
.innerHTML = pending;

document.getElementById("deliveredCount")
.innerHTML = delivered;

// Products

const productRes =
await fetch(
"https://urban-culture-xe7v.onrender.com/products"
);

const products =
await productRes.json();

document.getElementById("productsCount")
.innerHTML =
products.length;

}

async function deleteOrder(index){

if(!confirm("Delete Order?")){
return;
}

await fetch(
`https://urban-culture-xe7v.onrender.com/orders/${index}`,
{
method:"DELETE"
}
);

loadDashboard();

}

loadDashboard();

</script>

</body>
</html>
