<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>URBAN Culture Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
display:flex;
min-height:100vh;
}

/* Sidebar */

.sidebar{
width:260px;
background:#0a0a0a;
border-right:1px solid #222;
padding:25px;
position:fixed;
left:0;
top:0;
height:100vh;
}

.logo{
font-size:30px;
font-weight:800;
margin-bottom:35px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
text-decoration:none;
color:white;
padding:14px 16px;
background:#111;
border-radius:14px;
transition:.3s;
}

.menu a:hover{
background:white;
color:black;
}

/* Main */

.main{
margin-left:260px;
width:100%;
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.title{
font-size:42px;
font-weight:800;
}

.admin{
background:white;
color:black;
padding:12px 20px;
border-radius:14px;
font-weight:700;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:25px;
}

.card h3{
color:#999;
margin-bottom:10px;
}

.card h1{
font-size:36px;
font-weight:800;
}

.revenue{
color:#00ff88;
}

.pending{
color:#ffcc00;
}

.confirmed{
color:#00aaff;
}

.delivered{
color:#00ff66;
}

.chart-box{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:20px;
margin-bottom:30px;
}

.delete-btn{
background:#ff0033;
color:white;
border:none;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.delete-btn:hover{
opacity:.8;
}

@media(max-width:768px){

.sidebar{
display:none;
}

.main{
margin-left:0;
padding:15px;
}

.cards{
grid-template-columns:1fr 1fr;
}

.title{
font-size:30px;
}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
URBAN Culture
</div>

<div class="menu">

<a href="#">🏠 Dashboard</a>

<a href="manage-products.html">
📦 Products
</a>

<a href="add-product.html">
➕ Add Product
</a>

<a href="manage-orders.html">
🛒 Orders
</a>

<a href="customers.html">
👥 Customers
</a>

<a href="analytics.html">
📊 Analytics
</a>

</div>

</div>

<div class="main">

<div class="header">

<h1 class="title">
Dashboard
</h1>

<div class="admin">
Manager
</div>

</div>

<div class="cards">

<div class="card">
<h3>Revenue</h3>
<h1 id="revenue" class="revenue">₹0</h1>
</div>

<div class="card">
<h3>Pending</h3>
<h1 id="pending" class="pending">0</h1>
</div>

<div class="card">
<h3>Confirmed</h3>
<h1 id="confirmed" class="confirmed">0</h1>
</div>

<div class="card">
<h3>Delivered</h3>
<h1 id="delivered" class="delivered">0</h1>
</div>

</div>

<div class="chart-box">

<h2 style="margin-bottom:20px">
Monthly Sales
</h2>

<canvas id="salesChart"></canvas>

</div>
<div class="chart-box">

<h2 style="margin-bottom:20px">
Recent Orders
</h2>

<div style="overflow-x:auto;">

<table
style="
width:100%;
border-collapse:collapse;
">

<thead>

<tr>

<th style="padding:15px;text-align:left;border-bottom:1px solid #222;">
Order ID
</th>

<th style="padding:15px;text-align:left;border-bottom:1px solid #222;">
Customer
</th>

<th style="padding:15px;text-align:left;border-bottom:1px solid #222;">
Amount
</th>

<th style="padding:15px;text-align:left;border-bottom:1px solid #222;">
Status
</th>

<th style="padding:15px;text-align:left;border-bottom:1px solid #222;">
Action
</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

</div>

<script>

/* Chart */

const ctx =
document.getElementById(
"salesChart"
);

new Chart(ctx,{
type:"bar",
data:{
labels:[
"Jan",
"Feb",
"Mar",
"Apr",
"May",
"Jun"
],
datasets:[{
label:"Sales",
data:[0,0,0,0,0,0]
}]
}
});

/* Delete Order */

async function deleteOrder(id){

if(!confirm("Delete Order ?"))
return;

try{

await fetch(
`https://urban-culture-xe7v.onrender.com/orders/${id}`,
{
method:"DELETE"
}
);

loadDashboard();

}catch(err){

console.log(err);

}

}

/* Dashboard */

async function loadDashboard(){

try{

const res =
await fetch(
"https://urban-culture-xe7v.onrender.com/orders"
);

const orders =
await res.json();

let revenue = 0;
let pending = 0;
let confirmed = 0;
let delivered = 0;

let html = "";

orders.reverse().forEach(
(order,index)=>{

revenue += Number(
order.total ||
order.price ||
0
);

if(order.status==="Pending"){
pending++;
}

if(order.status==="Confirmed"){
confirmed++;
}

if(order.status==="Delivered"){
delivered++;
}

html += `

<tr>

<td style="padding:15px;border-bottom:1px solid #222;">
${order.orderId || ("UC"+index)}
</td>

<td style="padding:15px;border-bottom:1px solid #222;">
${order.name || "Customer"}
</td>

<td style="padding:15px;border-bottom:1px solid #222;">
₹${order.total || order.price || 0}
</td>

<td style="padding:15px;border-bottom:1px solid #222;">
${order.status || "Pending"}
</td>

<td style="padding:15px;border-bottom:1px solid #222;">

<button
class="delete-btn"
onclick="deleteOrder('${order._id}')">

Delete

</button>

</td>

</tr>

`;

});

document.getElementById(
"revenue"
).innerHTML =
"₹" + revenue;

document.getElementById(
"pending"
).innerHTML =
pending;

document.getElementById(
"confirmed"
).innerHTML =
confirmed;

document.getElementById(
"delivered"
).innerHTML =
delivered;

document.getElementById(
"ordersTable"
).innerHTML =
html;

}catch(err){

console.log(err);

}

}

loadDashboard();

</script>

</body>
</html>
