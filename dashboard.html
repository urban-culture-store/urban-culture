<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:white;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:10px;
}

.logo{
font-size:32px;
font-weight:700;
}

.logout{
background:white;
color:black;
border:none;
padding:12px 20px;
border-radius:14px;
font-weight:bold;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:25px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
padding:20px;
border-radius:22px;
}

.card h3{
color:#aaa;
margin-bottom:8px;
}

.card h1{
font-size:32px;
}

.section{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
padding:20px;
border-radius:22px;
margin-bottom:20px;
overflow:auto;
}

.section h2{
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.status{
padding:6px 12px;
border-radius:10px;
background:#222;
display:inline-block;
}

@media(max-width:768px){

.logo{
font-size:26px;
}

.card h1{
font-size:26px;
}

}

</style>

</head>

<body>

<div class="header">

<div class="logo">
📊 URBAN Dashboard
</div>

<button
class="logout"
onclick="logout()">
Logout </button>

</div>

<div class="cards">

<div class="card">
<h3>Total Revenue</h3>
<h1 id="revenue">₹0</h1>
</div>

<div class="card">
<h3>Total Orders</h3>
<h1 id="orders">0</h1>
</div>

<div class="card">
<h3>Products</h3>
<h1 id="products">0</h1>
</div>

<div class="card">
<h3>Customers</h3>
<h1 id="customers">0</h1>
</div>

</div>

<div class="section">

<h2>📦 Recent Orders</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Total</th>
<th>Status</th>
</tr>
</thead>

<tbody id="recentOrders">

</tbody>

</table>

</div>

<div class="section">

<h2>📈 Revenue Overview</h2>

<canvas
id="graph"
width="900"
height="250"> </canvas>

</div>

<script>

if(
localStorage.getItem("admin")
!== "true"
){
window.location.href =
"admin-login.html";
}

function logout(){

localStorage.removeItem(
"admin"
);

window.location.href =
"admin-login.html";

}

async function loadDashboard(){

try{

const orderRes =
await fetch(
"http://localhost:5000/orders"
);

const ordersData =
await orderRes.json();

const productRes =
await fetch(
"http://localhost:5000/products"
);

const productsData =
await productRes.json();

let revenue = 0;

const customers =
new Set();

ordersData.forEach(order=>{

revenue +=
Number(order.total || 0);

if(order.phone){

customers.add(
order.phone
);

}

});

document.getElementById(
"revenue"
).innerHTML =
"₹" + revenue;

document.getElementById(
"orders"
).innerHTML =
ordersData.length;

document.getElementById(
"products"
).innerHTML =
productsData.length;

document.getElementById(
"customers"
).innerHTML =
customers.size;

/* Recent Orders */

let recentHTML = "";

ordersData
.slice()
.reverse()
.slice(0,8)

.forEach(order=>{

recentHTML += `

<tr>

<td>
${order.name || ""}
</td>

<td>
₹${order.total || 0}
</td>

<td>
<span class="status">
${order.status || "Pending"}
</span>
</td>

</tr>

`;

});

document.getElementById(
"recentOrders"
).innerHTML =
recentHTML;

/* Revenue Graph */

const canvas =
document.getElementById(
"graph"
);

const ctx =
canvas.getContext("2d");

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

const totals =
ordersData.map(
o => Number(o.total || 0)
);

if(totals.length > 0){

const max =
Math.max(...totals);

ctx.strokeStyle =
"white";

ctx.lineWidth = 3;

ctx.beginPath();

totals.forEach((value,index)=>{

const x =
(index + 1) *
(canvas.width /
(totals.length + 1));

const y =
canvas.height -
(
(value / max) *
180
) - 20;

if(index === 0){

ctx.moveTo(x,y);

}else{

ctx.lineTo(x,y);

}

ctx.fillStyle =
"white";

ctx.fillRect(
x - 3,
y - 3,
6,
6
);

});

ctx.stroke();

}

}catch(err){

console.log(err);

}

}

loadDashboard();

</script>

</body>
</html>
