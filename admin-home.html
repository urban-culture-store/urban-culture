<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN Culture Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:white;
display:flex;
min-height:100vh;
}

.sidebar{
width:260px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border-right:1px solid rgba(255,255,255,0.1);
padding:25px;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:35px;
}

.menu a{
display:block;
text-decoration:none;
color:white;
padding:15px;
margin-bottom:10px;
border-radius:15px;
background:rgba(255,255,255,0.03);
transition:.3s;
}

.menu a:hover{
background:white;
color:black;
}

.main{
flex:1;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.title{
font-size:34px;
font-weight:bold;
}

.logout{
background:white;
color:black;
border:none;
padding:12px 20px;
border-radius:15px;
font-weight:bold;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:25px;
text-align:center;
}

.card h3{
color:#aaa;
margin-bottom:10px;
}

.card h1{
font-size:32px;
}

.chart{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:25px;
margin-top:20px;
}

.product-bar{
margin-bottom:20px;
}

.product-name{
margin-bottom:8px;
font-weight:bold;
}

.product-fill{
height:35px;
background:white;
color:black;
border-radius:12px;
display:flex;
align-items:center;
padding-left:12px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
URBAN Admin
</div>

<div class="menu">

<a href="dashboard.html">
📊 Dashboard
</a>

<a href="manage-orders.html">
📦 Orders
</a>

<a href="manage-products.html">
🛍 Products
</a>

<a href="customers.html">
👥 Customers
</a>

<a href="analytics.html">
📈 Analytics
</a>

<a href="coupons.html">
🎟 Coupons
</a>

<a href="reviews.html">
⭐ Reviews
</a>

</div>

</div>

<div class="main">

<div class="header">

<div class="title">
Admin Home
</div>

<button
class="logout"
onclick="logout()">
Logout </button>

</div>

<div class="cards">

<div class="card">
<h3>Total Revenue</h3>
<h1 id="revenue">₹0</h1>
</div>

<div class="card">
<h3>Total Orders</h3>
<h1 id="orders">0</h1>
</div>

<div class="card">
<h3>Customers</h3>
<h1 id="customers">0</h1>
</div>

<div class="card">
<h3>Products</h3>
<h1 id="products">0</h1>
</div>

</div>

<div class="chart">

<h2>
📈 Revenue Overview
</h2>

<canvas
id="revenueGraph"
width="900"
height="300"> </canvas>

</div>
<div class="chart">

<h2 style="margin-bottom:20px;">
📦 Recent Orders
</h2>

<table
style="
width:100%;
border-collapse:collapse;
">

<thead>

<tr>

<th
style="
padding:12px;
text-align:left;
">
Customer
</th>

<th
style="
padding:12px;
text-align:left;
">
Phone
</th>

<th
style="
padding:12px;
text-align:left;
">
Total
</th>

<th
style="
padding:12px;
text-align:left;
">
Status
</th>

</tr>

</thead>

<tbody id="recentOrders">
<div class="chart">

<h2 style="margin-bottom:20px;">
🏆 Top Selling Products
</h2>

<div id="topProducts">

</div>

</div>

</tbody>

</div>

</table>

</div>

<script>

if(
localStorage.getItem("admin")
!== "true"
){
window.location.href =
"admin-login.html";
}

function logout(){

localStorage.removeItem(
"admin"
);

window.location.href =
"admin-login.html";

}

async function loadAdminHome(){
const productSales = {};

orders.forEach(order=>{

if(order.items){

order.items.forEach(item=>{

if(!productSales[item.name]){

productSales[item.name] = 0;

}

productSales[item.name]++;

});

}

});

let topHTML = "";

Object.entries(productSales)

.sort((a,b)=>b[1]-a[1])

.slice(0,5)

.forEach(product=>{

const width =
product[1] * 60;

topHTML += `

<div class="product-bar">

<div class="product-name">
${product[0]}
</div>

<div
class="product-fill"
style="width:${width}px">
${product[1]} Sold
</div>

</div>

`;

});

document.getElementById(
"topProducts"
).innerHTML =
topHTML;

try{

const ordersRes =
await fetch(
"https://urban-culture.onrender.com/orders"
);

const orders =
await ordersRes.json();

let revenue = 0;

const customerPhones =
new Set();

orders.forEach(order=>{

revenue +=
Number(order.total || 0);

if(order.phone){

customerPhones.add(
order.phone
);

}

});

document.getElementById(
"revenue"
).innerHTML =
"₹" + revenue;

document.getElementById(
"orders"
).innerHTML =
orders.length;

document.getElementById(
"customers"
).innerHTML =
customerPhones.size;

const productRes =
await fetch(
"https://urban-culture.onrender.com/products"
);

const products =
await productRes.json();

document.getElementById(
"products"
).innerHTML =
products.length;

/* Revenue Graph */

const canvas =
document.getElementById(
"revenueGraph"
);

const ctx =
canvas.getContext("2d");

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

const totals =
orders.map(
o => Number(o.total || 0)
);

if(totals.length > 0){

const max =
Math.max(...totals);

ctx.beginPath();

totals.forEach((value,index)=>{

const x =
(index + 1) *
(canvas.width /
(totals.length + 1));

const y =
canvas.height -
(
(value / max) *
250
) - 20;

if(index === 0){

ctx.moveTo(x,y);

}else{

ctx.lineTo(x,y);

}

ctx.fillStyle =
"white";

ctx.beginPath();

ctx.arc(
x,
y,
5,
0,
Math.PI * 2
);

ctx.fill();

});

ctx.strokeStyle =
"white";

ctx.lineWidth = 3;

ctx.stroke();

}

}catch(err){

console.log(err);

}

}

loadAdminHome();
let ordersHTML = "";

orders
.slice()
.reverse()
.slice(0,5)
.forEach(order=>{

ordersHTML += `

<tr>

<td style="padding:12px;">
${order.name}
</td>

<td style="padding:12px;">
${order.phone}
</td>

<td style="padding:12px;">
₹${order.total || 0}
</td>

<td style="padding:12px;">
${order.status || "Pending"}
</td>

</tr>

`;

});

document.getElementById(
"recentOrders"
).innerHTML =
ordersHTML;

</script>

</div>

</body>
</html>
