<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>URBAN Culture</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#000;
color:#fff;
overflow:hidden;
}

/* Animated Background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.08),transparent 300px),
radial-gradient(circle at 80% 80%,rgba(255,255,255,.05),transparent 300px),
#000;
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.05);
animation:float 12s infinite ease-in-out;
}

.c1{
width:220px;
height:220px;
top:10%;
left:-50px;
}

.c2{
width:150px;
height:150px;
bottom:15%;
right:-30px;
animation-delay:2s;
}

.c3{
width:100px;
height:100px;
top:60%;
left:20%;
animation-delay:4s;
}

@keyframes float{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-40px);
}
}

/* Header */

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.4);
backdrop-filter:blur(20px);
z-index:1000;
}

.logo{
font-size:28px;
font-weight:bold;
}

.login-btn{
background:#fff;
color:#000;
border:none;
padding:12px 25px;
border-radius:15px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* Hero */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:95px;
line-height:0.95;
animation:fadeUp 1s ease;
}

.hero p{
margin-top:25px;
font-size:24px;
color:#aaa;
max-width:700px;
animation:fadeUp 1.5s ease;
}

.shop-btn{
margin-top:40px;
padding:20px 55px;
font-size:24px;
font-weight:bold;
background:#fff;
color:#000;
border:none;
border-radius:20px;
cursor:pointer;
transition:.3s;
animation:fadeUp 2s ease;
}

.shop-btn:hover{
transform:scale(1.08);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Bottom Badge */

.badge{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:10px 20px;
border-radius:50px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
font-size:14px;
color:#ccc;
}

/* Mobile */

@media(max-width:768px){

.logo{
font-size:20px;
}

.login-btn{
padding:10px 20px;
font-size:14px;
}

.hero h1{
font-size:65px;
}

.hero p{
font-size:18px;
}

.shop-btn{
width:90%;
max-width:320px;
font-size:22px;
}

}

</style>

</head>

<body>

<div class="bg">
<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>
</div>

<header>

<div class="logo">
URBAN Culture
</div>

<button
class="login-btn"
onclick="window.location.href='customer-login.html'">
Login </button>

</header>

<section class="hero">

<h1>
URBAN<br>
Culture
</h1>

<p>
Premium Streetwear & Fashion Collection
</p>

<button
class="shop-btn"
onclick="window.location.href='products.html'">
🛍 Shop Now </button>

</section>

<div class="badge">
Premium Fashion • Urban Style • 2026
</div>

</body>
</html>
