<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>URBAN Culture</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,.9);
backdrop-filter:blur(15px);
z-index:1000;
}

.logo{
font-size:28px;
font-weight:bold;
}

.login-btn{
background:#fff;
color:#000;
border:none;
padding:12px 25px;
border-radius:15px;
font-weight:bold;
cursor:pointer;
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:80px;
line-height:1;
}

.hero p{
margin-top:20px;
font-size:22px;
color:#aaa;
}

.shop-btn{
margin-top:35px;
padding:18px 50px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:18px;
background:#fff;
color:#000;
cursor:pointer;
}

.products-section{
padding:30px 20px;
}

.section-title{
font-size:32px;
margin-bottom:25px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:#111;
border-radius:20px;
overflow:hidden;
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.card h3{
margin-bottom:10px;
}

.price{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.stock{
color:#00ff88;
margin-bottom:15px;
}

.buy-btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#fff;
color:#000;
font-weight:bold;
cursor:pointer;
}

@media(max-width:768px){

.hero h1{
font-size:58px;
}

.hero p{
font-size:18px;
}

.logo{
font-size:22px;
}

.products{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<header>

<div class="logo">
URBAN Culture
</div>

<button
class="login-btn"
onclick="window.location.href='customer-login.html'">
Login
</button>

</header>

<section class="hero">

<h1>
URBAN<br>
Culture
</h1>

<p>
Premium Streetwear & Fashion Collection
</p>

<button
class="shop-btn"
onclick="openStore()">
🛍 Shop Now
</button>

</section>

<section
class="products-section"
id="storeSection">

<h2 class="section-title">
Featured Products
</h2>

<div
class="products"
id="products">
</div>

</section>
<script>

function openStore(){

document
.getElementById("storeSection")
.scrollIntoView({
behavior:"smooth"
});

}

let allProducts=[];

async function loadProducts(){

try{

const res =
await fetch(
"https://urban-culture.onrender.com/products"
);

const data =
await res.json();

allProducts = data;

renderProducts(data);

}catch(err){

document.getElementById("products")
.innerHTML =
"<h2>Products Loading Failed</h2>";

}

}

function renderProducts(products){

const container =
document.getElementById("products");

container.innerHTML="";

products.forEach(product=>{

container.innerHTML += `

<div class="card">

<img src="${product.image}">

<div class="card-body">

<h3>${product.name}</h3>

<div class="price">
₹${product.price}
</div>

<div class="stock">
Stock : ${product.stock}
</div>

<button class="buy-btn">
View Product
</button>

</div>

</div>

`;

});

}

loadProducts();

</script>

</body>
</html>
