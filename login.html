<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - URBAN Culture.ind</title>

<style>
body{
background:black;
font-family:Arial,sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:400px;
background:#111;
padding:30px;
border:1px solid red;
border-radius:10px;
}

h1{
text-align:center;
color:red;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
background:#222;
border:1px solid #444;
color:white;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:red;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

#message{
text-align:center;
margin-top:15px;
}
</style>
</head>
<body>

<div class="container">

<h1>Customer Login</h1>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<button onclick="register()">Register</button>

<div id="message"></div>

</div>

<script>
function login(){
document.getElementById("message").innerHTML =
"✅ Login Successful";
document.getElementById("message").style.color="lime";
}

function register(){
document.getElementById("message").innerHTML =
"✅ Registration Successful";
document.getElementById("message").style.color="lime";
}
</script>

</body>
</html>
