<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Add Product
</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* Glow */

body::before{

content:"";

position:fixed;

width:500px;
height:500px;

background:
rgba(255,255,255,.05);

filter:blur(120px);

top:-120px;
left:-120px;

animation:
moveGlow 10s infinite alternate;

z-index:-1;

}

@keyframes moveGlow{

0%{
transform:translate(0,0);
}

100%{
transform:translate(180px,120px);
}

}

/* Header */

header{

position:sticky;
top:0;

background:
rgba(0,0,0,.75);

backdrop-filter:
blur(20px);

padding:18px;

display:flex;

justify-content:
space-between;

align-items:center;

border-bottom:
1px solid rgba(255,255,255,.08);

}

.logo{

font-size:28px;
font-weight:800;

}

.back-btn{

background:#111;

color:white;

padding:12px 16px;

border:none;

border-radius:12px;

cursor:pointer;

}

/* Main */

.container{

width:92%;

max-width:900px;

margin:auto;

padding:25px 0;

}

.card{

background:
linear-gradient(
135deg,
rgba(255,255,255,.08),
rgba(255,255,255,.02)
);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:
blur(25px);

padding:25px;

border-radius:30px;

}

.title{

font-size:32px;
font-weight:800;

margin-bottom:20px;

}

input,
select,
textarea{

width:100%;

padding:16px;

margin-bottom:15px;

background:#111;

border:1px solid #222;

border-radius:16px;

color:white;

font-size:16px;

outline:none;

}

textarea{

height:120px;
resize:none;

}

.file-box{

padding:20px;

border:2px dashed #333;

border-radius:20px;

margin-bottom:15px;

}

.preview{

width:100%;
height:280px;

object-fit:cover;

border-radius:20px;

background:#111;

border:1px solid #222;

margin-bottom:20px;

}

.save-btn{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:white;

color:black;

font-size:18px;

font-weight:800;

cursor:pointer;

}

</style></head><body><header><div class="logo">
URBAN Culture
</div><button
class="back-btn"
onclick="location.href='dashboard.html'">

← Dashboard

</button></header><div class="container"><div class="card"><div class="title">
Add New Product
</div>
<img
id="previewImage"
class="preview"
src="">

<input
type="text"
id="name"
placeholder="Product Name">

<input
type="number"
id="price"
placeholder="Price">

<input
type="number"
id="stock"
placeholder="Stock Quantity">

<select id="category"><option>T-Shirt</option>
<option>Hoodie</option>
<option>Shirt</option>
<option>Pants</option>
<option>Accessories</option></select><select id="featured"><option value="No">
Normal Product
</option><option value="Yes">
Featured Product
</option></select><div class="file-box"><h3 style="margin-bottom:10px">
📸 Product Image 1
</h3><input
type="file"
id="image1"
accept="image/*"
onchange="previewImage()">

</div><div class="file-box"><h3 style="margin-bottom:10px">
📸 Product Image 2
</h3><input
type="file"
id="image2"
accept="image/*">

</div><div class="file-box"><h3 style="margin-bottom:10px">
📸 Product Image 3
</h3><input
type="file"
id="image3"
accept="image/*">

</div><textarea
id="description"
placeholder="Product Description">
</textarea><button
class="save-btn"
onclick="addProduct()">

➕ Add Product

</button></div></div>
<script>

function previewImage(){

const file =
document.getElementById(
"image1"
).files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload =
function(e){

document.getElementById(
"previewImage"
).src =
e.target.result;

};

reader.readAsDataURL(
file
);

}

async function addProduct(){

const file =
document.getElementById(
"image1"
).files[0];

if(!file){

alert(
"Select Product Image"
);

return;

}

const reader =
new FileReader();

reader.onload =
async function(e){

const product = {

name:
document.getElementById(
"name"
).value,

price:
document.getElementById(
"price"
).value,

stock:
document.getElementById(
"stock"
).value,

category:
document.getElementById(
"category"
).value,

featured:
document.getElementById(
"featured"
).value,

image:
e.target.result,

images:[
e.target.result,
e.target.result,
e.target.result
],

description:
document.getElementById(
"description"
).value

};

try{

await fetch(
"https://urban-culture.onrender.com/products",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:
JSON.stringify(
product
)
}
);

alert(
"✅ Product Added Successfully"
);

location.reload();

}catch(err){

alert(
"❌ Failed To Add Product"
);

}

};

reader.readAsDataURL(
file
);

}

</script></body>
</html>
