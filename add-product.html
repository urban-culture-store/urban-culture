<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product - URBAN Culture</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:750px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.1);
border-radius:30px;
padding:30px;
}

h1{
text-align:center;
margin-bottom:25px;
font-size:35px;
}

.preview{
width:100%;
height:280px;
background:#111;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
display:flex;
justify-content:center;
align-items:center;
}

.preview img{
width:100%;
height:100%;
object-fit:cover;
}

input,
select,
textarea{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:15px;
font-size:16px;
}

textarea{
height:120px;
resize:none;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:#fff;
color:#000;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>

</head>

<body>

<div class="container">

<h1>Add Product</h1>

<div class="preview">
<img
id="previewImage"
src="https://via.placeholder.com/700x300?text=Product+Image">
</div>

<input
type="text"
id="name"
placeholder="Product Name">

<input
type="number"
id="price"
placeholder="Price">

<input
type="number"
id="stock"
placeholder="Stock Quantity">

<select id="category">
<option>T-Shirt</option>
<option>Hoodie</option>
<option>Shirt</option>
<option>Pants</option>
<option>Accessories</option>
</select>

<select id="featured">
<option value="No">Normal Product</option>
<option value="Yes">Featured Product</option>
</select>

<input
type="text"
id="image"
placeholder="Image URL"
onkeyup="previewImage()">

<textarea
id="description"
placeholder="Product Description">
</textarea>

<button onclick="addProduct()">
Add Product
</button>

</div>

<script>

function previewImage(){

const image =
document.getElementById("image").value;

document.getElementById("previewImage").src =
image ||
"https://via.placeholder.com/700x300?text=Product+Image";

}

async function addProduct(){

const product = {

name:
document.getElementById("name").value,

price:
document.getElementById("price").value,

stock:
document.getElementById("stock").value,

category:
document.getElementById("category").value,

featured:
document.getElementById("featured").value,

image:
document.getElementById("image").value,

description:
document.getElementById("description").value

};

if(
!product.name ||
!product.price
){

alert("Please fill required fields");
return;

}

try{

await fetch(
"https://urban-culture.onrender.com/products",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(product)
}
);

alert("✅ Product Added Successfully");

window.location.href =
"manage-products.html";

}catch(error){

alert("❌ Failed To Add Product");

}

}

</script>

</body>
</html>
