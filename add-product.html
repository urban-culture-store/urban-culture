
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
URBAN Culture - Add Product
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
}

.header{

display:flex;

justify-content:
space-between;

align-items:center;

padding:20px;

border-bottom:
1px solid #222;

background:#000;

position:sticky;

top:0;

z-index:100;

}

.logo{

font-size:28px;

font-weight:800;

}

.back-btn{

background:#111;

color:white;

padding:12px 18px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:600;

}

.container{

width:95%;

max-width:900px;

margin:30px auto;

}

.card{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

padding:25px;

border-radius:25px;

backdrop-filter:blur(15px);

}

.title{

font-size:32px;

font-weight:800;

margin-bottom:25px;

}

.preview{

width:100%;

height:320px;

background:#111;

border-radius:20px;

object-fit:cover;

margin-bottom:20px;

border:1px solid #222;

}

input,
select,
textarea{

width:100%;

padding:16px;

margin-bottom:15px;

background:#111;

border:none;

border-radius:14px;

color:white;

font-size:16px;

outline:none;

}

.upload-box{

padding:15px;

border:2px dashed #333;

border-radius:15px;

margin-bottom:15px;

}

.upload-box h3{

margin-bottom:10px;

}

textarea{

height:130px;

resize:none;

}

.save-btn{

width:100%;

padding:18px;

background:white;

color:black;

border:none;

border-radius:15px;

font-size:18px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.save-btn:hover{

transform:scale(1.02);

}

</style>

</head>

<body>

<div class="header">

<div class="logo">
URBAN Culture
</div>

<button
class="back-btn"
onclick="location.href='dashboard.html'">

← Dashboard

</button>

</div>

<div class="container">

<div class="card">

<h1 class="title">
Add Product
</h1>

<img
id="preview"
class="preview"
src=""
alt="Preview">

<input
type="text"
id="name"
placeholder="Product Name">

<input
type="number"
id="price"
placeholder="Product Price">

<input
type="number"
id="stock"
placeholder="Stock Quantity">
<select id="category">

<option value="T-Shirt">
T-Shirt
</option>

<option value="Hoodie">
sweatshirt
</option>

<option value="Shirt">
Shirt
</option>

<option value="Pants">
Pants
</option>

<option value="Accessories">
sandels
</option>

</select>

<select id="featured">

<option value="No">
Normal Product
</option>

<option value="Yes">
Featured Product
</option>

</select>

<div class="upload-box">

<h3>
📸 Product Image 1
</h3>

<input
type="file"
id="image1"
accept="image/*"
onchange="previewImage()">

</div>

<div class="upload-box">

<h3>
📸 Product Image 2
</h3>

<input
type="file"
id="image2"
accept="image/*">

</div>

<div class="upload-box">

<h3>
📸 Product Image 3
</h3>

<input
type="file"
id="image3"
accept="image/*">

</div>

<textarea
id="description"
placeholder="Product Description">
</textarea>

<button
class="save-btn"
onclick="addProduct()">

➕ Add Product

</button>

</div>

</div>
<script>

function previewImage(){

const file =
document.getElementById("image1").files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload = function(e){

document.getElementById(
"preview"
).src = e.target.result;

};

reader.readAsDataURL(file);

}


async function addProduct(){

const imageInput =
document.getElementById("image1");

if(!imageInput.files[0]){

alert("📸 Select Product Image");
return;

}

const reader =
new FileReader();

reader.onload =
async function(e){

const file = imageInput.files[0];

const formData = new FormData();

formData.append("file", file);

formData.append(
"upload_preset",
"urbanculture"
);

const uploadResponse = await fetch(
"https://api.cloudinary.com/v1_1/urban-culture/image/upload",
{
method:"POST",
body:formData
}
);

const uploadData =
await uploadResponse.json();

const product = {

name:
document.getElementById("name").value,

price:
document.getElementById("price").value,

stock:
document.getElementById("stock").value,

category:
document.getElementById("category").value,

featured:
document.getElementById("featured").value,

image: uploadData.secure_url,

images: [],

description:
document.getElementById("description").value

};

try{

const response =
await fetch(
"https://urban-culture.onrender.com/products",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(product)
}
);

const result =
await response.json();

console.log(result);

if(!response.ok){

throw new Error(
result.message ||
"Failed"
);

}

alert(
"✅ Product Added Successfully"
);

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("stock").value="";
document.getElementById("description").value="";
document.getElementById("image1").value="";
document.getElementById("image2").value="";
document.getElementById("image3").value="";
document.getElementById("preview").src="";

}
catch(error){

console.error(error);

alert(
"❌ Product Add Failed"
);

}

};

reader.readAsDataURL(
imageInput.files[0]
);

}

</script>

</body>
</html>
