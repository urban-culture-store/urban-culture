<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist - URBAN Culture</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:white;
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.logo{
font-size:32px;
font-weight:bold;
}

.back{
background:white;
color:black;
border:none;
padding:12px 20px;
border-radius:15px;
cursor:pointer;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
overflow:hidden;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.info{
padding:20px;
}

.name{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.price{
font-size:26px;
margin-bottom:15px;
}

.btns{
display:flex;
gap:10px;
}

.cart{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

.remove{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:red;
color:white;
cursor:pointer;
}

.empty{
text-align:center;
margin-top:80px;
font-size:25px;
color:#999;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
❤️ Wishlist
</div>

<button
class="back"
onclick="window.location.href='products.html'">
Store </button>

</div>

<div id="wishlist"></div>

<script>

let wishlist =
JSON.parse(
localStorage.getItem("wishlist")
) || [];

function loadWishlist(){

const box =
document.getElementById("wishlist");

if(wishlist.length===0){

box.innerHTML=
'<div class="empty">Wishlist Empty</div>';

return;

}

let html="";

wishlist.forEach((item,index)=>{

html += `

<div class="card">

<img
src="${
item.image ||
'https://via.placeholder.com/500'
}">

<div class="info">

<div class="name">
${item.name}
</div>

<div class="price">
₹${item.price}
</div>

<div class="btns">

<button
class="cart"
onclick="addToCart(${index})">
Add To Cart
</button>

<button
class="remove"
onclick="removeWish(${index})">
Remove
</button>

</div>

</div>

</div>

`;

});

box.innerHTML = html;

}

function addToCart(index){

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

cart.push(wishlist[index]);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("✅ Added To Cart");

}

function removeWish(index){

wishlist.splice(index,1);

localStorage.setItem(
"wishlist",
JSON.stringify(wishlist)
);

loadWishlist();

}

loadWishlist();

</script>

</body>
</html>
