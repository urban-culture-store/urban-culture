```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.register-box{
width:100%;
max-width:420px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.15);
border-radius:30px;
padding:35px;
}

.logo{
text-align:center;
font-size:32px;
font-weight:bold;
margin-bottom:30px;
color:white;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
background:#111;
border:1px solid #333;
border-radius:12px;
color:white;
font-size:16px;
}

.password-box{
display:flex;
gap:10px;
margin-bottom:15px;
}

.password-box input{
margin-bottom:0;
flex:1;
}

.eye-btn{
width:60px;
border:none;
border-radius:12px;
background:white;
cursor:pointer;
font-size:18px;
}

.register-btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:white;
color:black;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.register-btn:hover{
opacity:.9;
}

#msg{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.link{
margin-top:20px;
text-align:center;
}

.link a{
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<div class="register-box">

<div class="logo">
URBAN Culture
</div>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="tel"
id="phone"
placeholder="Phone Number">

<div class="password-box">

<input
type="password"
id="password"
placeholder="Password">

<button
type="button"
class="eye-btn"
onclick="togglePassword()">
👁
</button>

</div>

<button
class="register-btn"
onclick="register()">
CREATE ACCOUNT
</button>

<div id="msg"></div>

<div class="link">
<a href="customer-login.html">
Already Have Account?
</a>
</div>

</div>

<script>

function togglePassword(){

const p =
document.getElementById("password");

p.type =
p.type === "password"
? "text"
: "password";

}

async function register(){

const user = {
name: document.getElementById("name").value.trim(),
phone: document.getElementById("phone").value.trim(),
password: document.getElementById("password").value
};

if(!user.name || !user.phone || !user.password){
document.getElementById("msg").style.color="#ff4444";
document.getElementById("msg").innerHTML="Fill Required Fields";
return;
}

try{

const res = await fetch(
"https://urban-culture-xe7v.onrender.com/register",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(user)
}
);

const data = await res.json();

document.getElementById("msg").style.color =
data.success ? "#00ff88" : "#ff4444";

document.getElementById("msg").innerHTML =
data.message;

if(data.success){
setTimeout(()=>{
location.href="customer-login.html";
},1000);
}

}catch(err){

document.getElementById("msg").style.color="#ff4444";
document.getElementById("msg").innerHTML="Server Error";

}

}

</script>

</body>
</html>
```
