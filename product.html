<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Products - URBAN Culture</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* Animated Background */

body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:rgba(255,255,255,.05);
filter:blur(120px);
top:-100px;
left:-100px;
animation:glowMove 10s infinite alternate;
z-index:-1;
}

@keyframes glowMove{

0%{
transform:translate(0,0);
}

100%{
transform:translate(200px,120px);
}

}

/* Header */

header{
position:sticky;
top:0;
z-index:1000;
background:rgba(0,0,0,.75);
backdrop-filter:blur(20px);
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:28px;
font-weight:800;
}

.right{
display:flex;
gap:10px;
}

.top-btn{
background:#111;
border:none;
color:white;
padding:12px 15px;
border-radius:14px;
cursor:pointer;
}

/* Search */

.search-box{
padding:20px;
}

.search{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:#111;
color:white;
font-size:16px;
outline:none;
}

/* Products Grid */

.products{
padding:15px;
display:grid;
grid-template-columns:
repeat(2,1fr);
gap:15px;
}

/* Product Card */

.card{
background:#111;
border-radius:24px;
overflow:hidden;
border:1px solid #222;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.info{
padding:14px;
}

.badge{
display:inline-block;
padding:6px 10px;
background:#fff;
color:#000;
font-size:11px;
font-weight:bold;
border-radius:8px;
margin-bottom:8px;
}

.name{
font-size:17px;
font-weight:700;
margin-bottom:8px;
}

.price{
font-size:22px;
font-weight:800;
color:#00ff88;
margin-bottom:12px;
}

.actions{
display:flex;
gap:8px;
}

.cartBtn{
flex:1;
background:#fff;
color:#000;
border:none;
padding:10px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.wishBtn{
width:50px;
border:none;
border-radius:12px;
background:#222;
color:white;
cursor:pointer;
font-size:18px;
}

@media(max-width:768px){

.logo{
font-size:22px;
}

.card img{
height:180px;
}

.name{
font-size:15px;
}

.price{
font-size:18px;
}

}

</style></head><body>
<header><div class="logo">
URBAN Culture
</div><div class="right"><button
class="top-btn"
onclick="location.href='profile.html'">
👤
</button>

<button
class="top-btn"
onclick="location.href='wishlist.html'">
❤️
</button>

<button
class="top-btn"
onclick="location.href='cart.html'">
🛒
</button>

</div></header><div class="search-box"><input
type="text"
id="search"
class="search"
placeholder="Search Products..."
onkeyup="filterProducts()">

</div><div
class="products"
id="products"></div>
<script>

let allProducts = [];

async function loadProducts(){

try{

const res = await fetch(
"https://urban-culture.onrender.com/products"
);

const products = await res.json();

allProducts = products.reverse();

renderProducts(allProducts);

}catch(err){

console.log(err);

document.getElementById(
"products"
).innerHTML =

"<h2 style='text-align:center'>Failed To Load Products</h2>";

}

}

function renderProducts(products){

let html = "";

products.forEach((product,index)=>{

html += `

<div
class="card"
onclick='openProduct(${JSON.stringify(product)})'>

<img
src="${product.image}"
alt="${product.name}">

<div class="info">

${product.featured==="Yes"

? '<div class="badge">FEATURED</div>'

: ''

}

<div class="name">

${product.name}

</div>

<div class="price">

₹${product.price}

</div>

<div class="actions">

<button
class="cartBtn"
onclick="
event.stopPropagation();
addToCart(${index})
">

Add To Cart

</button>

<button
class="wishBtn"
onclick="
event.stopPropagation();
addWishlist(${index})
">

❤️

</button>

</div>

</div>

</div>

`;

});

document.getElementById(
"products"
).innerHTML = html;

}

function filterProducts(){

const search =
document.getElementById(
"search"
).value.toLowerCase();

const filtered =

allProducts.filter(product =>

product.name
.toLowerCase()
.includes(search)

);

renderProducts(filtered);

}

function openProduct(product){

localStorage.setItem(

"selectedProduct",

JSON.stringify(product)

);

window.location.href =
"product.html";

}

function addToCart(index){

let cart =

JSON.parse(
localStorage.getItem("cart")
)

|| [];

cart.push(allProducts[index]);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert(
"✅ Added To Cart"
);

}

function addWishlist(index){

let wishlist =

JSON.parse(
localStorage.getItem(
"wishlist"
))

|| [];

wishlist.push(allProducts[index]);

localStorage.setItem(

"wishlist",

JSON.stringify(wishlist)

);

alert(
"❤️ Added To Wishlist"
);

}

loadProducts();

</script></body>
</html>
