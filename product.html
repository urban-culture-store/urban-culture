<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>URBAN Culture Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

.back-btn{
display:inline-block;
margin-bottom:20px;
padding:12px 18px;
background:#111;
color:white;
text-decoration:none;
border-radius:12px;
}

.product-image{
width:100%;
height:450px;
object-fit:cover;
border-radius:20px;
background:#111;
margin-bottom:20px;
}

.product-name{
font-size:34px;
font-weight:bold;
margin-bottom:10px;
}

.product-price{
font-size:30px;
font-weight:bold;
color:#00ff88;
margin-bottom:15px;
}

.product-desc{
color:#aaa;
line-height:1.6;
margin-bottom:20px;
}

select{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#111;
color:white;
margin-bottom:15px;
font-size:16px;
}

.buttons{
display:flex;
gap:10px;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.cart-btn{
background:white;
color:black;
}

.buy-btn{
background:#00ff88;
color:black;
}

.stock{
margin-top:15px;
color:#00ff88;
font-weight:bold;
}

@media(max-width:768px){

.product-image{
height:320px;
}

.product-name{
font-size:28px;
}

.buttons{
flex-direction:column;
}

}

.gallery{
display:flex;
gap:10px;
margin-top:15px;
margin-bottom:20px;
}

.thumb{
width:80px;
height:80px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
border:2px solid #222;
}

.thumb:hover{
border:2px solid white;
}


</style>

</head>

<body>

<div class="container">

<a href="products.html" class="back-btn">
← Back To Products
</a>

<img
id="productImage"
class="product-image"
src="">

<div class="gallery">

<img
id="thumb1"
class="thumb"
onclick="changeImage(this.src)">

<img
id="thumb2"
class="thumb"
onclick="changeImage(this.src)">

<img
id="thumb3"
class="thumb"
onclick="changeImage(this.src)">

</div>

<div
id="productName"
class="product-name">
</div>

<div
id="productPrice"
class="product-price">
</div>

<div
id="productDesc"
class="product-desc">
</div>

<select id="size">

<option value="">
Select Size
</option>

<option value="S">
S
</option>

<option value="M">
M
</option>

<option value="L">
L
</option>

<option value="XL">
XL
</option>

<option value="XXL">
XXL
</option>

</select>

<div class="buttons">

<button
class="cart-btn"
onclick="addToCart()">
🛒 Add To Cart </button>

<button
class="buy-btn"
onclick="buyNow()">
⚡ Buy Now </button>

</div>

</div>

<script>

const product =
JSON.parse(
localStorage.getItem(
"selectedProduct"
)
);

if(!product){

window.location.href =
"products.html";

}

document.getElementById(
"productImage"
).src =
product.image;

if(product.images){

document.getElementById(
"thumb1"
).src =
product.images[0] || "";

document.getElementById(
"thumb2"
).src =
product.images[1] || "";

document.getElementById(
"thumb3"
).src =
product.images[2] || "";

}

document.getElementById(
"productName"
).innerHTML =
product.name;

document.getElementById(
"productPrice"
).innerHTML =
"₹" + product.price;

document.getElementById(
"productDesc"
).innerHTML =
product.description ||
"Premium URBAN Culture Product";

function addToCart(){

const size =
document.getElementById(
"size"
).value;

const qty =
document.getElementById(
"qty"
).value;

if(size===""){

alert(
"Please Select Size"
);

return;

}

let cart =
JSON.parse(
localStorage.getItem(
"cart"
)
) || [];

cart.push({

...product,

size:size,

qty:qty

});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert(
"✅ Added To Cart"
);

}

function buyNow(){

addToCart();

window.location.href =
"cart.html";

}

function changeImage(src){

document.getElementById(
"productImage"
).src = src;

}

</script>

</body>
</html>
