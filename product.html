<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Product Details
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#050505;
color:white;

overflow-x:hidden;

}

.container{

width:95%;
max-width:1400px;

margin:auto;

padding:20px 0;

}

.back-btn{

display:inline-block;

padding:12px 18px;

background:#111;

color:white;

text-decoration:none;

border-radius:14px;

margin-bottom:25px;

}

.product-section{

display:grid;

grid-template-columns:
1fr 1fr;

gap:40px;

align-items:start;

}

/* Images */

.image-box{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

border-radius:30px;

padding:20px;

}

.main-image{

width:100%;

height:520px;

object-fit:cover;

border-radius:25px;

background:#111;

}

.gallery{

display:flex;

gap:12px;

margin-top:15px;

}

.thumb{

width:90px;
height:90px;

object-fit:cover;

border-radius:15px;

cursor:pointer;

border:2px solid transparent;

}

.thumb:hover{

border-color:white;

}

/* Details */

.details{

padding-top:10px;

}

.product-name{

font-size:42px;

font-weight:800;

margin-bottom:15px;

}

.product-price{

font-size:38px;

font-weight:800;

margin-bottom:20px;

}

.product-desc{

color:#aaa;

line-height:1.8;

margin-bottom:25px;

}

select{

width:100%;

padding:16px;

background:#111;

border:none;

border-radius:16px;

color:white;

margin-bottom:15px;

font-size:16px;

}

.buttons{

display:flex;

gap:15px;

margin-top:10px;

}

.cart-btn{

flex:1;

padding:16px;

border:none;

border-radius:16px;

background:white;

color:black;

font-weight:700;

cursor:pointer;

}

.buy-btn{

flex:1;

padding:16px;

border:none;

border-radius:16px;

background:#111;

color:white;

font-weight:700;

cursor:pointer;

border:1px solid #333;

}

/* Suggestions */

.suggestions{

margin-top:70px;

}

.suggestions h2{

font-size:32px;

margin-bottom:25px;

}

.suggestion-grid{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:20px;

}

@media(max-width:768px){

.product-section{

grid-template-columns:
1fr;

}

.main-image{

height:380px;

}

.product-name{

font-size:30px;

}

.suggestion-grid{

grid-template-columns:
1fr 1fr;

}

}

</style>

</head>

<body>

<div class="container">

<a
href="products.html"
class="back-btn">

← Back To Shop

</a>
<div class="product-section">

<div class="image-box">

<img
id="productImage"
class="main-image"
src="">

<div class="gallery">

<img
id="thumb1"
class="thumb"
onclick="changeImage(this.src)">

<img
id="thumb2"
class="thumb"
onclick="changeImage(this.src)">

<img
id="thumb3"
class="thumb"
onclick="changeImage(this.src)">

</div>

</div>

<div class="details">

<div
id="productName"
class="product-name">

Loading...

</div>

<div
id="productPrice"
class="product-price">

₹0

</div>

<div
id="productDesc"
class="product-desc">

Premium URBAN Culture Product

</div>

<select id="size">

<option value="">
Select Size
</option>

<option value="S">
S
</option>

<option value="M">
M
</option>

<option value="L">
L
</option>

<option value="XL">
XL
</option>

<option value="XXL">
XXL
</option>

</select>

<select id="qty">

<option value="1">
Qty 1
</option>

<option value="2">
Qty 2
</option>

<option value="3">
Qty 3
</option>

<option value="4">
Qty 4
</option>

<option value="5">
Qty 5
</option>

</select>

<div class="buttons">

<button
class="cart-btn"
onclick="addToCart()">

🛒 Add To Cart

</button>

<button
class="buy-btn"
onclick="buyNow()">

⚡ Buy Now

</button>

</div>

</div>

</div>

<div class="suggestions">

<h2>
You May Also Like
</h2>

<div
id="suggestions"
class="suggestion-grid">

</div>

</div>
<script>

const product =
JSON.parse(
localStorage.getItem(
"selectedProduct"
)
);

if(!product){

window.location.href =
"products.html";

}

/* Main Product */

document.getElementById(
"productImage"
).src =
product.image;

document.getElementById(
"productName"
).innerHTML =
product.name;

document.getElementById(
"productPrice"
).innerHTML =
"₹" + product.price;

document.getElementById(
"productDesc"
).innerHTML =
product.description ||
"Premium URBAN Culture Product";

/* Gallery */

if(product.images){

document.getElementById(
"thumb1"
).src =
product.images[0] ||
product.image;

document.getElementById(
"thumb2"
).src =
product.images[1] ||
product.image;

document.getElementById(
"thumb3"
).src =
product.images[2] ||
product.image;

}else{

document.getElementById(
"thumb1"
).src =
product.image;

document.getElementById(
"thumb2"
).src =
product.image;

document.getElementById(
"thumb3"
).src =
product.image;

}

function changeImage(src){

document.getElementById(
"productImage"
).src = src;

}

/* Add To Cart */

function addToCart(){

const size =
document.getElementById(
"size"
).value;

const qty =
document.getElementById(
"qty"
).value;

if(size===""){

alert(
"Please Select Size"
);

return;

}

let cart =

JSON.parse(
localStorage.getItem(
"cart"
)
) || [];

cart.push({

...product,

size:size,

qty:qty

});

localStorage.setItem(

"cart",

JSON.stringify(cart)

);

alert(
"✅ Added To Cart"
);

}

/* Buy Now */

function buyNow(){

const size =
document.getElementById(
"size"
).value;

if(size===""){

alert(
"Please Select Size"
);

return;

}

addToCart();

window.location.href =
"cart.html";

}

/* Suggestions */

async function loadSuggestions(){

const product = JSON.parse(localStorage.getItem("selectedProduct"));

try{

const res =
await fetch(
"https://urban-culture-xe7v.onrender.com/products"
);

const products =
await res.json();

let html = "";

products

.filter(item=>

item.name !==
product.name

)

.slice(0,4)

.forEach(item=>{

html += `

<div
onclick='openSuggestion(${JSON.stringify(item)})'
style="
background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

border-radius:20px;

overflow:hidden;

cursor:pointer;
">

<img
src="${item.image}"
style="
width:100%;
height:220px;
object-fit:cover;
">

<div
style="
padding:15px;
">

<h3>

${item.name}

</h3>

<p
style="
margin-top:10px;
font-size:20px;
font-weight:700;
">

₹${item.price}

</p>

</div>

</div>

`;

});

document.getElementById(
"suggestions"
).innerHTML =
html;

}catch(err){

console.log(err);

}

}

function openSuggestion(item){

localStorage.setItem(

"selectedProduct",

JSON.stringify(item)

);

location.reload();

}

loadSuggestions();

</script>

</body>
</html>
