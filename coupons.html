<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupon Manager</title>

<style>

body{
background:#000;
color:white;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
padding:25px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
margin-bottom:20px;
backdrop-filter:blur(20px);
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

.coupon{
padding:15px;
background:#111;
border-radius:12px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>Create Coupon</h2>

<input
id="code"
placeholder="Coupon Code">

<input
id="discount"
type="number"
placeholder="Discount %">

<button onclick="createCoupon()">
Create Coupon
</button>

</div>

<div class="card">

<h2>Available Coupons</h2>

<div id="couponList"></div>

</div>

</div>

<script>

function createCoupon(){

const code =
document.getElementById("code").value;

const discount =
document.getElementById("discount").value;

if(!code || !discount){
alert("Fill all fields");
return;
}

let coupons =
JSON.parse(
localStorage.getItem("coupons")
) || [];

coupons.push({
code,
discount
});

localStorage.setItem(
"coupons",
JSON.stringify(coupons)
);

loadCoupons();

}

function loadCoupons(){

let coupons =
JSON.parse(
localStorage.getItem("coupons")
) || [];

let html = "";

coupons.forEach(coupon=>{

html += `
<div class="coupon">
🎟 ${coupon.code}
- ${coupon.discount}% OFF
</div>
`;

});

document.getElementById(
"couponList"
).innerHTML = html;

}

loadCoupons();

</script>

</body>
</html>
