
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>URBAN Culture Products</title>

rel="stylesheet">

<style>

```css
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
min-height:100vh;
position:relative;
}

/* Background Glow */

.bg-glow{
position:fixed;
border-radius:50%;
filter:blur(120px);
opacity:.18;
z-index:-1;
animation:float 10s ease-in-out infinite;
}

.glow1{
width:350px;
height:350px;
background:white;
top:-100px;
left:-100px;
}

.glow2{
width:300px;
height:300px;
background:#666;
right:-80px;
top:250px;
animation-delay:2s;
}

.glow3{
width:250px;
height:250px;
background:#999;
bottom:-50px;
left:40%;
animation-delay:4s;
}

@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(40px);
}

100%{
transform:translateY(0);
}

}

/* Navbar */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.08);
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:28px;
font-weight:800;
}

.nav-actions{
display:flex;
gap:15px;
}

.nav-actions a{
text-decoration:none;
color:white;
padding:10px 16px;
border-radius:12px;
transition:.3s;
}

.nav-actions a:hover{
background:white;
color:black;
}

/* Hero */

.hero{
padding:60px 8%;
}

.hero-glass{
padding:50px;
text-align:center;
border-radius:30px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
}

.hero-glass h1{
font-size:56px;
margin-bottom:15px;
}

.hero-glass p{
color:#ccc;
font-size:18px;
}

/* Search */

.controls{
padding:30px 8%;
display:flex;
gap:20px;
flex-wrap:wrap;
}

.controls input,
.controls select{
flex:1;
min-width:220px;
padding:15px;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,.05);
color:white;
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
}

/* Products */

.products-section{
padding:20px 8% 80px;
}

.products-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.product-card{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
overflow:hidden;
transition:.35s;
position:relative;
}

.product-card:hover{
transform:translateY(-10px);
}

.product-image{
width:100%;
height:280px;
object-fit:cover;
transition:.4s;
}

.product-card:hover .product-image{
transform:scale(1.08);
}

.product-info{
padding:20px;
}

.product-name{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.product-price{
font-size:24px;
font-weight:800;
margin-bottom:15px;
}

.product-desc{
color:#aaa;
font-size:14px;
margin-bottom:20px;
}

.featured{
position:absolute;
top:15px;
right:15px;
background:white;
color:black;
padding:8px 14px;
border-radius:30px;
font-size:12px;
font-weight:700;
}

.actions{
display:flex;
gap:10px;
}

.actions button{
flex:1;
padding:12px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:600;
}

.cart-btn{
background:#111;
color:white;
border:1px solid #333;
}

.buy-btn{
background:white;
color:black;
}

/* Modal */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
padding:20px;
z-index:9999;
}

.modal-content{
max-width:500px;
width:100%;
background:rgba(255,255,255,.05);
backdrop-filter:blur(30px);
border-radius:30px;
padding:30px;
position:relative;
text-align:center;
}

.modal-content img{
width:100%;
height:300px;
object-fit:cover;
border-radius:20px;
margin-bottom:20px;
}

.close{
position:absolute;
top:15px;
right:20px;
font-size:34px;
cursor:pointer;
}

.view-btn{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:white;
color:black;
font-weight:700;
cursor:pointer;
margin-top:15px;
}

/* Mobile */

@media(max-width:768px){

.hero-glass h1{
font-size:38px;
}

.navbar{
flex-direction:column;
gap:15px;
}

.controls{
flex-direction:column;
}

}
```

</style>

</head>

<body>

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>
<div class="bg-glow glow3"></div>

<nav class="navbar">

<div class="logo">
URBAN Culture
</div>

<div class="nav-actions">

<a href="index.html">
Home
</a>

<a href="cart.html">
🛒 Cart
</a>

<a href="profile.html">
👤 Profile
</a>

</div>

</nav>

<section class="hero">

<div class="hero-glass">

<h1>
Premium Collection
</h1>

<p>
Modern Streetwear.
Premium Quality.

</p>

</div>

</section>

<section class="controls">

<input

<option value="Pants">

<option value="Accessories">

<section

<div

<!-- Products Load Here -->

id="productModal">

<div
class="modal-content">

class="close"
onclick="closeModal()">
×

id="modalImage"
src="">

</h2>

</h3>

</p>

<button
class="view-btn"
id="viewProductBtn">
View Product
</button>

</div>

</div>

<script>

```js
let allProducts = [];

async function loadProducts(){

try{

const res =
await fetch(
"https://urban-culture.onrender.com/products"
);

allProducts =
await res.json();

renderProducts(allProducts);

}catch(err){

console.log(err);

document.getElementById(
"productsGrid"
).innerHTML =

"<h2>Unable To Load Products</h2>";

}

}

function renderProducts(products){

let html = "";

products.forEach(product=>{

html += `

<div class="product-card">

${product.featured==="Yes"
? '<div class="featured">FEATURED</div>'
: ''}

<img
class="product-image"
src="${
product.image ||
'https://via.placeholder.com/500x500'
}">

<div class="product-info">

<div class="product-name">
${product.name}
</div>

<div class="product-price">
₹${product.price}
</div>

<div class="product-desc">
${product.description ||
"Premium URBAN Culture Product"}
</div>

<div class="actions">

<button
class="cart-btn"
onclick='quickView(${JSON.stringify(product)})'>
Quick View
</button>

<button
class="buy-btn"
onclick='openProduct(${JSON.stringify(product)})'>
Buy Now
</button>

</div>

</div>

</div>

`;

});

document.getElementById(
"productsGrid"
).innerHTML = html;

}

function quickView(product){

document.getElementById(
"productModal"
).style.display = "flex";

document.getElementById(
"modalImage"
).src =
product.image ||
"https://via.placeholder.com/500";

document.getElementById(
"modalName"
).innerHTML =
product.name;

document.getElementById(
"modalPrice"
).innerHTML =
"₹" + product.price;

document.getElementById(
"modalDesc"
).innerHTML =
product.description ||
"Premium URBAN Culture Product";

document.getElementById(
"viewProductBtn"
).onclick = ()=>{

localStorage.setItem(
"selectedProduct",
JSON.stringify(product)
);

window.location.href =
"product.html";

};

}

function closeModal(){

document.getElementById(
"productModal"
).style.display = "none";

}

function openProduct(product){

localStorage.setItem(
"selectedProduct",
JSON.stringify(product)
);

window.location.href =
"product.html";

}

document.getElementById(
"search"
).addEventListener(
"keyup",
function(){

const value =
this.value.toLowerCase();

const filtered =
allProducts.filter(product=>

product.name
.toLowerCase()
.includes(value)

);

renderProducts(filtered);

});

document.getElementById(
"category"
).addEventListener(
"change",
function(){

const value =
this.value;

if(value==="all"){

renderProducts(allProducts);

return;

}

const filtered =
allProducts.filter(product=>

product.category === value

);

renderProducts(filtered);

});

window.onclick =
function(event){

const modal =
document.getElementById(
"productModal"
);

if(event.target === modal){

modal.style.display =
"none";

}

};

loadProducts();
```


</script>
