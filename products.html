<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN Culture Products</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

header{
background:#000;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:32px;
font-weight:bold;
}

.right{
display:flex;
gap:10px;
}

.btn{
background:#fff;
color:#000;
border:none;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.search{
width:100%;
padding:15px;
margin:20px 0;
border:none;
border-radius:12px;
font-size:16px;
}

.container{
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:#111;
border-radius:20px;
overflow:hidden;
cursor:pointer;
transition:.3s;
border:1px solid #222;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.info{
padding:20px;
}

.badge{
display:inline-block;
background:gold;
color:black;
padding:5px 10px;
border-radius:10px;
font-size:12px;
font-weight:bold;
margin-bottom:10px;
}

.name{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.price{
font-size:30px;
font-weight:bold;
color:#00ff88;
margin-bottom:10px;
}

.stock{
color:#00ff88;
margin-bottom:15px;
font-weight:bold;
}

.actions{
display:flex;
gap:10px;
}

.cartBtn{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#fff;
font-weight:bold;
cursor:pointer;
}

.wishBtn{
width:55px;
border:none;
border-radius:10px;
background:#222;
color:white;
font-size:20px;
cursor:pointer;
}
</style>
</head>
<body>

<header>

<div class="logo">
URBAN Culture
</div>

<div class="right">

<button
class="top-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

<button class="btn"
onclick="location.href='wishlist.html'">
❤️ Wishlist (<span id="wishCount">0</span>)
</button>

<button class="btn"
onclick="location.href='cart.html'">
🛒 Cart (<span id="cartCount">0</span>)
</button>

</div>

</header>

<div class="container">

<input
class="search"
id="search"
placeholder="Search Products..."
onkeyup="filterProducts()">

<div class="products" id="products">
</div>

</div>

<script>

let allProducts=[];

async function loadProducts(){

try{

const res=await fetch(
"https://urban-culture.onrender.com/products"
);

allProducts=await res.json();

renderProducts(allProducts);

}catch(err){

document.getElementById("products").innerHTML=
"<h2>Products Not Available</h2>";

}

}

function renderProducts(products){

let html="";

products.forEach((product,index)=>{

html+=`

<div class="card">

<img
src="${product.image || 'https://via.placeholder.com/600'}"
onclick="openProduct(${index})">

<div class="info">

${product.featured==="Yes"
?'<div class="badge">FEATURED</div>'
:''}

<div class="name">${product.name}</div>

<div class="price">₹${product.price}</div>

<div class="stock">
Stock : ${product.stock || 0}
</div>

<div class="actions">

<button
class="cartBtn"
onclick="event.stopPropagation();addToCart(${index})">
Add To Cart
</button>

<button
class="wishBtn"
onclick="event.stopPropagation();addWishlist(${index})">
❤️
</button>

</div>

</div>

</div>

`;

});

document.getElementById("products").innerHTML=html;

}

function openProduct(index){

localStorage.setItem(
"selectedProduct",
JSON.stringify(allProducts[index])
);

window.location.href="product.html";

}

function addToCart(index){

let cart=
JSON.parse(localStorage.getItem("cart"))||[];

cart.push(allProducts[index]);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCartCount();

alert("Added To Cart");

}

function addWishlist(index){

let wishlist=
JSON.parse(localStorage.getItem("wishlist"))||[];

wishlist.push(allProducts[index]);

localStorage.setItem(
"wishlist",
JSON.stringify(wishlist)
);

updateWishCount();

alert("Added To Wishlist");

}

function updateCartCount(){

let cart=
JSON.parse(localStorage.getItem("cart"))||[];

document.getElementById("cartCount").innerHTML=
cart.length;

}

function updateWishCount(){

let wishlist=
JSON.parse(localStorage.getItem("wishlist"))||[];

document.getElementById("wishCount").innerHTML=
wishlist.length;

}

function filterProducts(){

const text=
document.getElementById("search")
.value
.toLowerCase();

const filtered=
allProducts.filter(p=>
p.name.toLowerCase().includes(text)
);

renderProducts(filtered);

}

loadProducts();
updateCartCount();
updateWishCount();

</script>

</body>
</html>
