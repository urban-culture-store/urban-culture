<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
URBAN Culture Store
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#050505;
color:white;

overflow-x:hidden;

}

/* Navbar */

.navbar{

position:sticky;
top:0;

z-index:999;

width:95%;

max-width:1400px;

margin:20px auto;

padding:18px 25px;

border-radius:25px;

background:
rgba(255,255,255,.04);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,.08);

display:flex;

justify-content:
space-between;

align-items:center;

}

.logo{

font-size:28px;
font-weight:800;

}

.nav-actions{

display:flex;
gap:12px;

}

.nav-btn{

background:#111;

color:white;

border:none;

padding:12px 16px;

border-radius:14px;

cursor:pointer;

}

/* Header */

.top-section{

width:95%;
max-width:1400px;

margin:auto;

padding:30px 0;

}

.title{

font-size:52px;

font-weight:800;

margin-bottom:10px;

}

.subtitle{

color:#999;

margin-bottom:25px;

}

/* Search */

.search-box{

display:flex;

gap:15px;

margin-bottom:30px;

}

.search{

flex:1;

padding:18px;

background:#111;

border:none;

border-radius:18px;

color:white;

font-size:16px;

}

.category{

padding:18px;

background:#111;

border:none;

border-radius:18px;

color:white;

}

/* Products Grid */

.products{

width:95%;
max-width:1400px;

margin:auto;

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:20px;

padding-bottom:50px;

}

.product{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

border-radius:25px;

overflow:hidden;

transition:.3s;

cursor:pointer;

}

.product:hover{

transform:
translateY(-5px);

}

.product img{

width:100%;

height:220px;

object-fit:cover;

background:#111;

}

.info{

padding:18px;

}

.name{

font-size:18px;
font-weight:700;

margin-bottom:10px;

}

.price{

font-size:24px;

font-weight:800;

margin-bottom:15px;

}

.buy-btn{

width:100%;

padding:14px;

background:white;

color:black;

border:none;

border-radius:14px;

font-weight:700;

cursor:pointer;

}

@media(max-width:768px){

.products{

grid-template-columns:
1fr 1fr;

gap:12px;

}

.product img{

height:160px;

}

.title{

font-size:36px;

}

}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">
URBAN Culture
</div>

<div class="nav-actions">

<button
class="nav-btn"
onclick="location.href='wishlist.html'">

❤️

</button>

<button
class="nav-btn"
onclick="location.href='cart.html'">

🛒

</button>

<button
class="nav-btn"
onclick="location.href='profile.html'">

👤

</button>

</div>

</div>

<div class="top-section">

<h1 class="title">
Shop Collection
</h1>

<p class="subtitle">
Premium Streetwear Collection
</p>

<div class="search-box">

<input
type="text"
id="search"
class="search"
placeholder="Search Products..."
onkeyup="filterProducts()">

<select
id="category"
class="category">

<option>
All Categories
</option>

<option>
T-Shirt
</option>

<option>
sandels
</option>

<option>
Shirt
</option>

<option>
Pants
</option>

</select>

</div>

</div>

<div
id="products"
class="products">

</div>
<script>

let allProducts = [];

async function loadProducts(){

const container =
document.getElementById(
"products"
);

container.innerHTML =

"<h2>Loading Products...</h2>";

try{

const response =
await fetch(
"https://urban-culture.onrender.com/products"
);

const products =
await response.json();

allProducts = products;

renderProducts(
products
);

}catch(err){

container.innerHTML =

"<h2>Failed To Load Products</h2>";

console.log(err);

}

}

function renderProducts(products){

const container =
document.getElementById(
"products"
);

if(products.length===0){

container.innerHTML =

"<h2>No Products Found</h2>";

return;

}

container.innerHTML =

products.map(product=>`

<div
class="product"
onclick='openProduct(${JSON.stringify(product)})'>

<img
src="${product.image}"
alt="${product.name}">

<div class="info">

<div class="name">

${product.name}

</div>

<div class="price">

₹${product.price}

</div>

<button
class="buy-btn">

View Product

</button>

</div>

</div>

`).join("");

}

function openProduct(product){

localStorage.setItem(

"selectedProduct",

JSON.stringify(product)

);

window.location.href =
"product.html";

}

function filterProducts(){

const search =
document.getElementById(
"search"
).value.toLowerCase();

const category =
document.getElementById(
"category"
).value;

let filtered =

allProducts.filter(product=>{

const nameMatch =

product.name
.toLowerCase()
.includes(search);

const categoryMatch =

category==="All Categories"

? true

: product.category===category;

return (
nameMatch &&
categoryMatch
);

});

renderProducts(
filtered
);

}

loadProducts();

</script>
<style>

.badge{

display:inline-block;

padding:6px 10px;

border-radius:10px;

background:white;

color:black;

font-size:12px;

font-weight:700;

margin-bottom:10px;

}

.buttons{

display:flex;

gap:10px;

margin-top:15px;

}

.cart-btn{

flex:1;

padding:12px;

background:white;

color:black;

border:none;

border-radius:12px;

font-weight:700;

cursor:pointer;

}

.wishlist-btn{

width:55px;

border:none;

border-radius:12px;

background:#111;

color:white;

cursor:pointer;

font-size:18px;

}

</style>

<script>

function renderProducts(products){

const container =
document.getElementById(
"products"
);

if(products.length===0){

container.innerHTML =
"<h2>No Products Found</h2>";

return;

}

let html = "";

products.forEach(product=>{

html += `

<div
class="product"
onclick='openProduct(${JSON.stringify(product)})'>

<img
src="${product.image}"
alt="${product.name}">

<div class="info">

${product.featured==="Yes"

? '<div class="badge">FEATURED</div>'

: ''

}

<div class="name">

${product.name}

</div>

<div class="price">

₹${product.price}

</div>

<div class="buttons">

<button
class="cart-btn"
onclick='event.stopPropagation();addToCart(${JSON.stringify(product)})'>

Add To Cart

</button>

<button
class="wishlist-btn"
onclick='event.stopPropagation();addWishlist(${JSON.stringify(product)})'>

❤️

</button>

</div>

</div>

</div>

`;

});

container.innerHTML = html;

}

function addToCart(product){

let cart =

JSON.parse(
localStorage.getItem(
"cart"
)
) || [];

cart.push(product);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert(
"✅ Added To Cart"
);

}

function addWishlist(product){

let wishlist =

JSON.parse(
localStorage.getItem(
"wishlist"
)
) || [];

wishlist.push(product);

localStorage.setItem(
"wishlist",
JSON.stringify(wishlist)
);

alert(
"❤️ Added To Wishlist"
);

}

</script>

</body>
</html>
