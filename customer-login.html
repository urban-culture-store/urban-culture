<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login - URBAN Culture</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#2b1055,#7597de);
overflow:hidden;
}

.login-box{
width:90%;
max-width:380px;
padding:35px;
border-radius:30px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 8px 40px rgba(0,0,0,.3);
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
background:rgba(255,255,255,.15);
margin:0 auto 25px;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
color:white;
}

.input-box{
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:14px;
background:transparent;
border:none;
border-bottom:1px solid rgba(255,255,255,.5);
color:white;
font-size:16px;
outline:none;
}

.input-box input::placeholder{
color:#ddd;
}

.options{
display:flex;
justify-content:space-between;
font-size:13px;
color:#ddd;
margin-bottom:20px;
}

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#6a11cb,#2575fc);
color:white;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

.login-btn:hover{
opacity:.9;
}

#msg{
margin-top:15px;
text-align:center;
font-size:14px;
}

.register{
text-align:center;
margin-top:20px;
}

.register a{
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<div class="avatar">
👤
</div>

<div class="input-box">
<input
type="tel"
id="phone"
placeholder="Phone Number">
</div>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Password">

<button
type="button"
onclick="togglePassword()">
👁
</button>

</div>

<div class="options">
<span>Remember me</span>
<span>Forgot Password?</span>
</div>

<button
class="login-btn"
onclick="login()">
LOGIN </button>

<div id="msg"></div>

<div class="register">
<a href="customer-register.html">
Create Account
</a>
</div>

</div>

<script>

function login(){

const phone =
document.getElementById("phone").value;

const password =
document.getElementById("password").value;

const users =
JSON.parse(
localStorage.getItem("users")
) || [];

const user =
users.find(u =>
u.phone === phone &&
u.password === password
);

if(user){

localStorage.setItem(
"customer",
JSON.stringify(user)
);

window.location.href =
"products.html";

}else{

document.getElementById("msg")
.style.color="#ff6666";

document.getElementById("msg")
.innerHTML =
"Invalid Email or Password";

}

}

function togglePassword(){

const p =
document.getElementById("password");

p.type =
p.type === "password"
? "text"
: "password";

}

</script>

</body>
</html>
