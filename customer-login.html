```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
width:100%;
max-width:420px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.15);
border-radius:30px;
padding:35px;
}

.logo{
text-align:center;
font-size:32px;
font-weight:bold;
margin-bottom:30px;
color:white;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
background:#111;
border:1px solid #333;
border-radius:12px;
color:white;
font-size:16px;
}

.password-box{
display:flex;
gap:10px;
margin-bottom:15px;
}

.password-box input{
margin-bottom:0;
flex:1;
}

.eye-btn{
width:60px;
border:none;
border-radius:12px;
background:white;
cursor:pointer;
font-size:18px;
}

.login-btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:white;
color:black;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.login-btn:hover{
opacity:.9;
}

#msg{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.link{
margin-top:20px;
text-align:center;
}

.link a{
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<div class="login-box">

<div class="logo">
URBAN Culture
</div>

<input
type="tel"
id="phone"
placeholder="Phone Number">

<div class="password-box">

<input
type="password"
id="password"
placeholder="Password">

<button
class="eye-btn"
onclick="togglePassword()">
👁
</button>

</div>

<button
class="login-btn"
onclick="login()">
LOGIN
</button>

<div id="msg"></div>

<div class="link">
<a href="customer-register.html">
Create Account
</a>
</div>

</div>

<script>

function togglePassword(){

const p =
document.getElementById("password");

p.type =
p.type === "password"
? "text"
: "password";

}

function login(){

const phone =
document.getElementById("phone").value;

const password =
document.getElementById("password").value;

const users =
JSON.parse(
localStorage.getItem("users")
) || [];

const user =
users.find(u =>
u.phone === phone &&
u.password === password
);

if(user){

localStorage.setItem(
"customer",
JSON.stringify(user)
);

window.location.href =
"products.html";

}else{

document.getElementById("msg")
.style.color="#ff4444";

document.getElementById("msg")
.innerHTML =
"Invalid Phone Number or Password";

}

}

</script>

</body>
</html>
```
