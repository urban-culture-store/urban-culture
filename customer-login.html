<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN Culture Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
width:100%;
max-width:400px;
background:#111;
border:1px solid #222;
border-radius:20px;
padding:30px;
box-shadow:0 0 30px rgba(255,255,255,0.05);
}

.logo{
font-size:32px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#aaa;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1a1a1a;
color:white;
font-size:16px;
outline:none;
}

input:focus{
border:1px solid white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:white;
color:black;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.register-link{
margin-top:20px;
text-align:center;
}

.register-link a{
color:white;
text-decoration:none;
font-weight:bold;
}

.message{
margin-top:15px;
text-align:center;
color:#00ff88;
}

.error{
color:#ff4444;
}

</style>
</head>

<body>

<div class="login-box">

<div class="logo">
URBAN Culture
</div>

<div class="subtitle">
Customer Login
</div>

<input
type="tel"
id="phone"
placeholder="Phone Number">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<div
id="message"
class="message">
</div>

<div class="register-link">
<a href="register.html">
Create New Account
</a>
</div>

</div>
<script>

async function login(){

const phone =
document.getElementById(
"phone"
).value.trim();

const password =
document.getElementById(
"password"
).value.trim();

const message =
document.getElementById(
"message"
);

if(
!phone ||
!password
){

message.innerHTML =
"Enter Phone & Password";

message.className =
"message error";

return;

}

try{

const response =
await fetch(
"https://urban-culture.onrender.com/login",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
phone,
password
})
}
);

const data =
await response.json();

if(response.ok){

localStorage.setItem(
"customer",
JSON.stringify(data.user)
);

message.innerHTML =
"✅ Login Success";

message.className =
"message";

setTimeout(()=>{

window.location.href =
"profile.html";

},1000);

}else{

message.innerHTML =
data.message ||
"Invalid Login";

message.className =
"message error";

}

}catch(err){

console.log(err);

message.innerHTML =
"Server Error";

message.className =
"message error";

}

}

/* Auto Login */

const customer =
JSON.parse(
localStorage.getItem(
"customer"
)
);

if(customer){

window.location.href =
"profile.html";

}

</script>

</body>
</html>
