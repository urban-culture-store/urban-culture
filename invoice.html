<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#fff;
color:#000;
padding:30px;
}

.bill{
max-width:800px;
margin:auto;
border:2px solid #000;
padding:25px;
}

.logo{
font-size:32px;
font-weight:bold;
margin-bottom:20px;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table,th,td{
border:1px solid #000;
}

th,td{
padding:10px;
text-align:left;
}

.total{
text-align:right;
font-size:22px;
font-weight:bold;
margin-top:20px;
}

#printBtn{
margin-top:20px;
padding:12px 20px;
border:none;
background:#000;
color:#fff;
cursor:pointer;
}

@media print{
#printBtn{
display:none;
}
}

</style>
</head>

<body>

<div class="bill">

<div class="logo">
URBAN Culture
</div>

<div id="invoiceData"></div>

<div id="qrcode"></div>

<button id="printBtn"
onclick="window.print()">
🖨️ Print Invoice
</button>

</div>
<script>

async function loadInvoice(){

const params =
new URLSearchParams(
window.location.search
);

const orderIndex =
params.get("order");

const res =
await fetch(
"https://urban-culture.onrender.com/orders"
);

const orders =
await res.json();

const order =
orders[orderIndex];

if(!order){

document.getElementById(
"invoiceData"
).innerHTML =
"<h2>Invoice Not Found</h2>";

return;

}

document.getElementById(
"invoiceData"
).innerHTML = `

<div class="row">
<div>
<b>Customer:</b>
${order.name}
</div>

<div>
<b>Order ID:</b>
${order.orderId || ("UC"+orderIndex)}
</div>
</div>

<div class="row">
<div>
<b>Phone:</b>
${order.phone}
</div>

<div>
<b>Date:</b>
${order.date}
</div>
</div>

<div style="margin-top:10px">
<b>Address:</b>
${order.address},
${order.state || ""},
${order.pincode || ""}
</div>

<table>

<tr>
<th>Product</th>
<th>Price</th>
</tr>

${order.items.map(item => `

<tr>
<td>${item.name}</td>
<td>₹${item.price}</td>
</tr>

`).join("")}

</table>

<div class="total">
Total : ₹${order.total}
</div>

<h3 style="margin-top:25px">
🚚 Shipping Label
</h3>

<p>
Tracking ID:
${order.trackingId || "Pending"}
</p>

<p>
Delivery Partner:
${order.deliveryPartner || "Not Assigned"}
</p>

`;

new QRCode(
document.getElementById("qrcode"),
{
text:
order.trackingId ||
order.orderId ||
("UC"+orderIndex),
width:150,
height:150
}
);

}

loadInvoice();

</script>

</body>
</html>
