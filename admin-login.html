<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>URBAN Culture Admin Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000,#111,#222);
}

.login-box{
width:420px;
padding:40px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.15);
border-radius:25px;
box-shadow:0 0 40px rgba(255,255,255,0.08);
}

h1{
text-align:center;
color:white;
margin-bottom:30px;
font-size:38px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:white;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:white;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.02);
}

#msg{
text-align:center;
margin-top:15px;
font-weight:bold;
color:#00ff66;
}

.brand{
text-align:center;
margin-bottom:20px;
color:#ccc;
font-size:14px;
letter-spacing:3px;
}

</style>

</head>

<body>

<div class="login-box">

<div class="brand">
URBAN CULTURE ADMIN PANEL
</div>

<h1>Login</h1>

<input
type="text"
id="username"
placeholder="Admin Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="adminLogin()">
LOGIN
</button>

<div id="msg"></div>

</div>

<script>

if(localStorage.getItem("admin") === "true"){
window.location.href="dashboard.html";
}

function adminLogin(){

const user =
document.getElementById("username").value.trim();

const pass =
document.getElementById("password").value.trim();

if(user === "admin" && pass === "1234"){

localStorage.setItem("admin","true");

document.getElementById("msg").innerHTML =
"✅ Login Success";

setTimeout(function(){

window.location.href="dashboard.html";

},800);

}else{

document.getElementById("msg").style.color="red";

document.getElementById("msg").innerHTML =
"❌ Invalid Username Or Password";

}

}

</script>

</body>
</html>
